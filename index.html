function checkBadges(state){
  const{xp,streak,earnedBadges=[],plans,progress,pomoCount=0}=state;
  const newBadges=[...earnedBadges];
  const add=id=>{if(!newBadges.includes(id))newBadges.push(id);};
  const allDone=(planId,subj)=>{
    const plan=plans.find(p=>p.id===planId);if(!plan)return false;
    const topics=Object.values(plan.schedule||{}).flat().map(id=>ALL_MAP[id]).filter(t=>t&&(!subj||t.subj===subj));
    const done=Object.values(progress[planId]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k));
    return topics.length>0&&topics.every(t=>done.includes(t.id));
  };
  const totalDone=plans.flatMap(p=>Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v))).length;
  if(totalDone>=1)add("first_topic");
  if(streak>=3)add("streak3");if(streak>=7)add("streak7");if(streak>=14)add("streak14");
  if(xp>=100)add("xp100");if(xp>=500)add("xp500");if(xp>=1500)add("xp1500");
  if(pomoCount>=5)add("pomo5");if(pomoCount>=25)add("pomo25");
  plans.forEach(p=>{
    const all=Object.values(p.schedule||{}).flat();const done=Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k));
    if(all.length>0&&done.length===all.length)add("first_plan");
    if(allDone(p.id,"physics"))add("physics_all");
    if(allDone(p.id,"maths"))add("maths_all");
    if(allDone(p.id,"chemistry"))add("chem_all");
  });
  return newBadges;
}

const addDays=(ds,n)=>{const[y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d+n);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const getDOW=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const fmtDate=(ds,opts={})=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',...opts});};
const fmtLong=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
const TODAY=(()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;})();
const LS={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};

function getPlanStatus(plan,progress){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  if(all.length>0&&done.length===all.length)return"completed";
  if(plan.endDate<TODAY)return"expired";
  if(plan.startDate>TODAY)return"upcoming";
  return"active";
}

function buildSchedule(ids,start,end){
  const topics=ids.map(id=>ALL_MAP[id]).filter(Boolean);if(!topics.length)return{};
  const days=[];let ds=start;while(ds<=end){days.push(ds);ds=addDays(ds,1);}
  const total=topics.length,td=days.length;
  const base=Math.max(1,Math.floor(total/td)),extra=total-base*td;
  const quota=days.map((_,i)=>i<extra?base+1:base);
  const byS={};topics.forEach(t=>{if(!byS[t.subj])byS[t.subj]=[];byS[t.subj].push(t);});
  const sk=Object.keys(byS);const il=[];let si=0,sf=0;
  while(il.length<total&&sf<total*3){sf++;const s=sk[si%sk.length];if(byS[s]&&byS[s].length>0)il.push(byS[s].shift());si++;}
  let pool=[...il];const sched={};
  for(let i=0;i<days.length;i++){
    const date=days[i],q=quota[i];if(!pool.length){sched[date]=[];continue;}
    const cs=COACHING[getDOW(date)];const la=Math.min(pool.length,q*2);
    const ai=cs.subj?pool.slice(0,la).findIndex(t=>t.subj===cs.subj&&(!cs.sec||t.sec===cs.sec)):-1;
    if(ai>0){const[a]=pool.splice(ai,1);pool.unshift(a);}
    sched[date]=pool.splice(0,q).map(t=>t.id);
  }
  return sched;
}

function beep(freq=880,dur=0.3,type="sine"){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type=type;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);}catch(e){}
}

// ── POMODORO HOOK ─────────────────────────────────────────────────────────────
function usePomodoro(onSessionComplete){
  const[workMin,setWorkMin]=useState(25);
  const[shortMin]=useState(5);
  const[longMin]=useState(15);
  const[timeLeft,setTimeLeft]=useState(25*60);
  const[running,setRunning]=useState(false);
  const[phase,setPhase]=useState("work"); // work|short|long
  const[session,setSession]=useState(0);
  const intervalRef=useRef(null);
  const pausedRef=useRef(false);

  useEffect(()=>{setTimeLeft(workMin*60);},[workMin]);

  useEffect(()=>{
    const onVis=()=>{
      if(document.hidden){pausedRef.current=running;setRunning(false);}
      else if(pausedRef.current){setRunning(true);pausedRef.current=false;}
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[running]);

  useEffect(()=>{
    if(!running){clearInterval(intervalRef.current);return;}
    intervalRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){
          clearInterval(intervalRef.current);
          setRunning(false);
          beep(660,0.5);setTimeout(()=>beep(880,0.5),600);
          if(phase==="work"){
            const ns=session+1;setSession(ns);
            onSessionComplete&&onSessionComplete();
            const nextPhase=ns%4===0?"long":"short";
            setPhase(nextPhase);
            setTimeLeft(nextPhase==="long"?longMin*60:shortMin*60);
          } else {setPhase("work");setTimeLeft(workMin*60);}
          return 0;
        }
        return t-1;
      });
    },1000);
    return()=>clearInterval(intervalRef.current);
  },[running,phase,session,workMin,shortMin,longMin]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const total=phase==="work"?workMin*60:phase==="short"?shortMin*60:longMin*60;
  const pct=((total-timeLeft)/total)*100;

  const reset=()=>{setRunning(false);setPhase("work");setTimeLeft(workMin*60);setSession(0);};
  const skip=()=>{
    setRunning(false);
    if(phase==="work"){const ns=session+1;setSession(ns);const np=ns%4===0?"long":"short";setPhase(np);setTimeLeft(np==="long"?longMin*60:shortMin*60);}
    else{setPhase("work");setTimeLeft(workMin*60);}
  };

  return{timeLeft,running,setRunning,phase,session,pct,fmt,reset,skip,workMin,setWorkMin,total};
}

// ── FOCUS MODE ────────────────────────────────────────────────────────────────
function FocusMode({topic,planName,isExpired,onComplete,onForceQuit,onXP}){
  const[showQuitConfirm,setShowQuitConfirm]=useState(false);
  const[sessionsDone,setSessionsDone]=useState(0);
  const[showBreak,setShowBreak]=useState(false);
  const pomo=usePomodoro(()=>{
    setSessionsDone(s=>s+1);
    onXP&&onXP(XP.POMO_SESSION);
    setShowBreak(true);
  });

  const color=COL[topic?.subj]||"#38BDF8";
  const circumference=2*Math.PI*54;
  const dash=circumference*(1-pomo.pct/100);

  const handleForceQuit=()=>{
    pomo.reset();
    onForceQuit&&onForceQuit();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#050810",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,overflow:"hidden"}}>
      {/* Ambient breathe */}
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${color}30 0%,transparent 70%)`,animation:"breathe 4s ease-in-out infinite",pointerEvents:"none"}}/>

      {/* Top bar */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:2}}>FOCUS MODE</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{planName}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {[...Array(Math.min(sessionsDone,8))].map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:color,opacity:0.8}}/>)}
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginLeft:4}}>{sessionsDone} sessions</div>
        </div>
      </div>

      {/* Topic name */}
      <div style={{textAlign:"center",marginBottom:40,position:"relative",zIndex:1}}>
        <div style={{fontSize:11,color:color,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontFamily:"'Space Mono',monospace"}}>{topic?.subj}</div>
        <div style={{fontWeight:900,fontSize:24,color:"white",lineHeight:1.3,maxWidth:300,margin:"0 auto"}}>{topic?.name}</div>
      </div>

      {/* Circular Timer */}
      <div style={{position:"relative",width:140,height:140,marginBottom:32}}>
        <svg width="140" height="140" style={{transform:"rotate(-90deg)"}}>
          <circle cx="70" cy="70" r="54" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
          <circle cx="70" cy="70" r="54" fill="none" stroke={color} strokeWidth="8"
            strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={dash}
            style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,color:"white",lineHeight:1}}>{pomo.fmt(pomo.timeLeft)}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:4,letterSpacing:1.5,textTransform:"uppercase"}}>{pomo.phase==="work"?"FOCUS":pomo.phase==="short"?"SHORT BREAK":"LONG BREAK"}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{display:"flex",gap:12,marginBottom:32}}>
        <button onClick={()=>pomo.setRunning(!pomo.running)} style={{width:64,height:64,borderRadius:"50%",background:pomo.running?`${color}22`:`${color}`,border:`2px solid ${color}`,color:pomo.running?"white":"#0A0F1E",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
          {pomo.running?"⏸":"▶"}
        </button>
        <button onClick={pomo.skip} style={{width:48,height:48,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:8}}>⏭</button>
      </div>

      {/* Mark done */}
      <button onClick={onComplete} style={{padding:"13px 32px",background:`linear-gradient(135deg,${color},${color}aa)`,color:"#0A0F1E",border:"none",borderRadius:50,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginBottom:16,letterSpacing:0.3}}>
        ✓ Mark Topic Done
      </button>

      {/* Force quit */}
      <button onClick={()=>setShowQuitConfirm(true)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",padding:"8px 16px"}}>
        Exit Focus Mode
      </button>

      {/* Break overlay */}
      {showBreak&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
          <div className="pop" style={{textAlign:"center",padding:32}}>
            <div style={{fontSize:52,marginBottom:12}}>☕</div>
            <div style={{fontWeight:800,fontSize:20,color:"white",marginBottom:8}}>Session Complete!</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:8}}>+{XP.POMO_SESSION} XP earned</div>
            <div style={{fontSize:12,color:color,marginBottom:24}}>{pomo.phase==="work"?"Take a break, you earned it.":pomo.phase==="short"?"5 min break":"15 min break — you earned it!"}</div>
            <button onClick={()=>setShowBreak(false)} style={{padding:"12px 28px",background:color,color:"#0A0F1E",border:"none",borderRadius:50,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Continue →</button>
          </div>
        </div>
      )}

      {/* Quit confirm */}
      {showQuitConfirm&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
          <div className="pop" style={{background:"rgba(15,25,50,0.98)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:20,padding:"28px 24px",maxWidth:320,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:800,fontSize:18,color:"white",marginBottom:8}}>Leave Focus Mode?</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:20,lineHeight:1.7}}>You will lose this session's progress.<br/><span style={{color:"#EF4444",fontWeight:700}}>-{XP.FORCE_QUIT_PENALTY} XP penalty</span></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowQuitConfirm(false)} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",color:"white",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Stay Focused</button>
              <button onClick={handleForceQuit} style={{flex:1,padding:"12px",background:"rgba(239,68,68,0.15)",color:"#EF4444",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>Exit (-{XP.FORCE_QUIT_PENALTY}XP)</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CERTIFICATE ───────────────────────────────────────────────────────────────
function Certificate({plan,progress,onClose}){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  const pct=all.length>0?Math.round(done.length/all.length*100):0;
  const byS={};all.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(done.includes(id))byS[s].d++;});
  useEffect(()=>{if(pct===100)spawnConfetti();},[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="pop" style={{background:"linear-gradient(135deg,#0F2044,#1a3a6b)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:24,padding:"32px 24px",maxWidth:400,width:"100%",textAlign:"center",boxShadow:"0 0 60px rgba(56,189,248,0.15)"}}>
        <div style={{fontSize:52,marginBottom:8}}>{pct===100?"🏆":"📋"}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.accent,letterSpacing:2,marginBottom:6}}>{pct===100?"PLAN COMPLETED!":"PLAN SUMMARY"}</div>
        <div style={{fontWeight:900,fontSize:20,color:T.text,marginBottom:4}}>{plan.name}</div>
        <div style={{fontSize:11,color:T.muted,marginBottom:20,fontFamily:"'Space Mono',monospace"}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:56,fontWeight:700,lineHeight:1,background:`linear-gradient(135deg,${pct===100?"#34D399,#38BDF8":"#FBBF24,#F87171"})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{pct}<span style={{fontSize:24}}>%</span></div>
        <div style={{fontSize:12,color:T.muted,marginBottom:20}}>{done.length} of {all.length} topics completed</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {Object.entries(byS).map(([s,{t,d}])=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:COL[s],width:14}}>{SUBJ_ICON[s]}</span>
              <span style={{fontSize:12,width:84,textTransform:"capitalize",color:"#94A3B8"}}>{s}</span>
              <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={5}/></div>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:30,textAlign:"right"}}>{d}/{t}</span>
            </div>
          ))}
        </div>
        {pct===100&&<div style={{background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:10,padding:"10px",marginBottom:16,fontSize:12,color:"#34D399"}}>+{XP.PLAN_COMPLETE} XP earned! 🎉</div>}
        <button onClick={onClose} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#0EA5E9,#38BDF8)",color:"#0A0F1E",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Close</button>
      </div>
    </div>
  );
}

// ── TODAY VIEW ────────────────────────────────────────────────────────────────
function TodayView({plans,progress,onToggle,streak,xp,onStartFocus}){
  const cs=COACHING[getDOW(TODAY)];
  const tasks=plans.filter(p=>getPlanStatus(p,progress)==="active").flatMap(plan=>(plan.schedule?.[TODAY]||[]).map(tid=>({planId:plan.id,planName:plan.name,id:tid,ch:ALL_MAP[tid],done:!!(progress[plan.id]?.[TODAY]?.[tid])})));
  const doneCount=tasks.filter(t=>t.done).length;
  const pct=tasks.length>0?Math.round(doneCount/tasks.length*100):0;
  const lv=getLevel(xp);
  // JEE countdown
  const jeeDate=new Date("2027-04-05");
  const daysLeft=Math.ceil((jeeDate-new Date())/(1000*60*60*24));

  return(
    <div className="fade-up">
      {/* XP + Streak */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <Card style={{flex:1,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>{lv.icon}</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.accent,letterSpacing:1}}>{lv.name}</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{xp} <span style={{fontSize:9,color:T.muted}}>XP</span></div></div>
        </Card>
        <Card style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:8,minWidth:90}}>
          <span style={{fontSize:22}}>🔥</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#FBBF24",letterSpacing:1}}>STREAK</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{streak}d</div></div>
        </Card>
        <Card style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:8,minWidth:90}}>
          <span style={{fontSize:18}}>🎯</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#F87171",letterSpacing:1}}>JEE</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{daysLeft}d</div></div>
        </Card>
      </div>

      {/* Today card */}
      <Card glow style={{padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:1.5,marginBottom:4}}>TODAY</div>
            <div style={{fontWeight:800,fontSize:14,color:T.text,lineHeight:1.3}}>{fmtLong(TODAY)}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>Coaching: <span style={{color:T.accent,fontWeight:700}}>{cs.label}</span></div>
          </div>
          {tasks.length>0&&<div style={{textAlign:"right"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,lineHeight:1,color:pct===100?"#34D399":T.accent}}>{pct}<span style={{fontSize:14}}>%</span></div><div style={{fontSize:10,color:T.muted}}>{doneCount}/{tasks.length}</div></div>}
        </div>
        {tasks.length>0&&<Bar pct={pct} color={pct===100?"#34D399":T.accent} h={5}/>}
      </Card>

      {!tasks.length?<div style={{textAlign:"center",color:T.muted,paddingTop:60}}><div style={{fontSize:52,opacity:0.2}}>◎</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.6}}>No tasks today.<br/>Create a plan to begin.</div></div>
      :tasks.map((t,i)=>{
        const c=COL[t.ch?.subj]||"#94A3B8";
        return(
          <div key={t.id+t.planId} style={{background:t.done?"rgba(52,211,153,0.06)":"rgba(15,25,50,0.8)",border:`1px solid ${t.done?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:14,padding:"12px 14px",marginBottom:8,animation:`fadeUp 0.3s ${i*0.05}s ease both`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div onClick={()=>onToggle(t.planId,TODAY,t.id)} style={{cursor:"pointer"}}>
                <CB done={t.done} color={c}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:t.done?"#34D399":T.text,textDecoration:t.done?"line-through":"none",opacity:t.done?0.7:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.ch?.name}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:2}}>{t.planName}{t.done&&<span style={{color:"#34D399",marginLeft:6,fontSize:10}}>+{XP.TOPIC_ONTIME}XP</span>}</div>
              </div>
              {!t.done&&(
                <button onClick={()=>onStartFocus({topic:t.ch,planId:t.planId,topicId:t.id,planName:t.planName,isExpired:false})}
                  style={{padding:"6px 12px",background:`${c}18`,border:`1px solid ${c}33`,borderRadius:8,color:c,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>
                  🎯 Focus
                </button>
              )}

          </div>
        );
      })}
    </div>
  );
}

// ── PLANS VIEW ────────────────────────────────────────────────────────────────
function PlansView({plans,progress,onDelete,onView,onExtend,onStartFocus}){
  const[tab,setTab]=useState("active");
  const active=plans.filter(p=>["active","upcoming"].includes(getPlanStatus(p,progress)));
  const arch=plans.filter(p=>["completed","expired"].includes(getPlanStatus(p,progress)));
  const show=tab==="active"?active:arch;
  if(!plans.length)return <div style={{textAlign:"center",color:T.muted,paddingTop:70}} className="fade-up"><div style={{fontSize:52,opacity:0.2,fontFamily:"'Space Mono',monospace"}}>[ ]</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.5}}>No plans yet.<br/>Tap <b style={{color:T.accent}}>New Plan</b> to create one.</div></div>;
  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["active",`Active (${active.length})`],["archive",`Archive (${arch.length})`]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px",borderRadius:10,border:`1.5px solid ${tab===k?T.accent:"rgba(255,255,255,0.08)"}`,background:tab===k?"rgba(56,189,248,0.1)":"rgba(255,255,255,0.03)",color:tab===k?T.accent:T.muted,fontWeight:700,cursor:"pointer",fontSize:11,fontFamily:"'Space Mono',monospace",letterSpacing:0.3}}>{l}</button>
        ))}
      </div>
      {!show.length?<div style={{textAlign:"center",color:T.muted,paddingTop:40,fontSize:13,opacity:0.5}}>{tab==="active"?"No active plans.":"No archived plans yet."}</div>
      :show.map(plan=>{
        const all=[...new Set(Object.values(plan.schedule||{}).flat())];
        const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
        const pct=all.length>0?Math.round(done.length/all.length*100):0;
        const st=getPlanStatus(plan,progress);
        const todayT=plan.schedule?.[TODAY]||[];
        return(
          <Card key={plan.id} style={{padding:"18px",marginBottom:12}} glow={st==="active"&&pct>0&&pct<100}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,minWidth:0,marginRight:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <div style={{fontWeight:800,fontSize:15,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{plan.name}</div>
                  <SBadge status={st}/>
                </div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)} · {plan.dailyHours}h/day</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:26,fontWeight:700,lineHeight:1,color:st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}}>{pct}<span style={{fontSize:12}}>%</span></div>
                <div style={{fontSize:10,color:T.muted}}>{done.length}/{all.length}</div>
              </div>
            </div>
            <Bar pct={pct} color={st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}/>
            <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>{(plan.subjects||[]).map(s=><Tag key={s} label={s} color={COL[s]}/>)}</div>
            {st==="active"&&todayT.length>0&&(
              <div style={{marginTop:10,fontSize:11,color:T.muted,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:10,lineHeight:1.7}}>
                <span style={{color:T.accent,fontWeight:700}}>Today → </span>{todayT.map(id=>ALL_MAP[id]?.name).filter(Boolean).join(" · ")}
              </div>
            )}
            {st==="expired"&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,fontSize:11,color:"#EF4444"}}>⚠️ Plan expired — {all.length-done.length} topics incomplete</div>}
            <div style={{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}}>
              <button onClick={()=>onView(plan,false)} style={{fontSize:11,color:T.accent,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>View Schedule →</button>
              {(st==="completed"||st==="expired")&&<button onClick={()=>onView(plan,true)} style={{fontSize:11,color:"#34D399",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📋 Summary</button>}
              {st==="expired"&&<button onClick={()=>onExtend(plan)} style={{fontSize:11,color:"#FBBF24",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📅 Extend</button>}
              <button onClick={()=>onDelete(plan.id)} style={{fontSize:11,color:"#EF4444",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"'DM Sans',sans-serif"}}>Delete</button>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ── PLAN DETAIL ───────────────────────────────────────────────────────────────
function PlanDetail({plan,progress,onToggle,onBack,onStartFocus}){
  const entries=Object.entries(plan.schedule||{});
  const isDone=(pid,date,tid)=>!!(progress[pid]?.[date]?.[tid]);
  const st=getPlanStatus(plan,progress);
  return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>‹</button>
        <div style={{fontWeight:800,fontSize:16,color:T.text,flex:1}}>{plan.name}</div>
        <SBadge status={st}/>
      </div>
      {entries.map(([date,ids])=>{
        const dow=getDOW(date),isPast=date<TODAY,isToday=date===TODAY;
        const allDone=ids.length>0&&ids.every(id=>isDone(plan.id,date,id));
        return(
          <div key={date} style={{background:isToday?"rgba(56,189,248,0.06)":allDone?"rgba(52,211,153,0.04)":"rgba(15,25,50,0.6)",border:`1px solid ${isToday?"rgba(56,189,248,0.2)":allDone?"rgba(52,211,153,0.15)":"rgba(255,255,255,0.05)"}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ids.length?8:0}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:isToday?T.accent:isPast?"#475569":"#94A3B8"}}>{isToday?"▶ ":""}{fmtDate(date)}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {ids.length>0&&<span style={{fontSize:9,background:"rgba(255,255,255,0.06)",color:T.muted,borderRadius:6,padding:"2px 7px",fontFamily:"'Space Mono',monospace",fontWeight:700}}>{ids.length} topics</span>}
                <span style={{fontSize:10,color:T.muted}}>{COACHING[dow].label}</span>
              </div>
            </div>
            {!ids.length?<div style={{fontSize:11,color:"#334155"}}>Buffer / Rest</div>:ids.map(id=>{
              const ch=ALL_MAP[id],d=isDone(plan.id,date,id),c=COL[ch?.subj]||"#94A3B8";
              return(
                <div key={id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div onClick={()=>onToggle(plan.id,date,id)} style={{cursor:"pointer"}}><CB done={d} color={c} size={16}/></div>
                  <span style={{fontSize:13,color:d?"#34D399":"#CBD5E1",textDecoration:d?"line-through":"none",opacity:d?0.6:1,flex:1}}>{ch?.name}</span>
                  {!d&&isToday&&<button onClick={()=>onStartFocus({topic:ch,planId:plan.id,topicId:id,planName:plan.name,isExpired:st==="expired"})} style={{padding:"3px 8px",background:`${c}15`,border:`1px solid ${c}30`,borderRadius:6,color:c,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>Focus</button>}
                  <div style={{width:6,height:6,borderRadius:"50%",background:c,flexShrink:0}}/>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function CreateView({onSave}){

  const[start,setStart]=useState("");
  const[end,setEnd]=useState("");

        </div>

      <Picker label="Mathematics" color={COL.maths} chapters={MATHS} sel={sel} setSel={setSel}/>
      <Picker label="Physics" color={COL.physics} chapters={PHYSICS} sel={sel} setSel={setSel}/>

      </div>
    );
  }
}

  const ov=allT.length>0?Math.round(allD.length/allT.length*100):0;

  return(
    <div className="fade-up">

            <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,letterSpacing:1.5}}>LEVEL</div>

            <div style={{fontFamily:"'Space Mono',monospace",fontSize:14,color:T.accent,fontWeight:700}}>{xp} XP</div>
          </div>

            <div style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:"#FBBF24"}}>🔥{streak}</div>
            <div style={{fontSize:9,color:T.muted,letterSpacing:1}}>STREAK</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:700,color:"#A78BFA",marginTop:4}}>⏱️{pomoCount}</div>
            <div style={{fontSize:9,color:T.muted}}>POMOS</div>
          </div>
        </div>
        {xpToNext>0&&<><div style={{fontSize:10,color:T.muted,marginBottom:6,fontFamily:"'Space Mono',monospace"}}>{xpToNext} XP to {nvl.name} {nvl.icon}</div><Bar pct={Math.round(((xp-lv.min)/Math.max(1,nvl.min-lv.min))*100)} color={T.accent} h={5}/></>}
      </Card>

      {/* Badges */}
      <Card style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14,color:T.text}}>🏅 Badges</div>

        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {BADGE_DEFS.map(b=>{
            const earned=earnedBadges.includes(b.id);
            return(
              <div key={b.id} title={b.desc} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 10px",background:earned?"rgba(56,189,248,0.08)":"rgba(255,255,255,0.03)",border:`1px solid ${earned?"rgba(56,189,248,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:10,opacity:earned?1:0.35,minWidth:56,cursor:"default"}}>
                <span style={{fontSize:22,filter:earned?"none":"grayscale(1)"}}>{b.icon}</span>
                <span style={{fontSize:8,color:earned?T.accent:T.muted,fontWeight:700,textAlign:"center",lineHeight:1.2,fontFamily:"'Space Mono',monospace"}}>{b.name}</span>
              </div>
            );

        </div>
      </Card>

      {/* Overall */}
      <Card style={{padding:"20px",marginBottom:12,textAlign:"center"}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:52,fontWeight:700,lineHeight:1,background:"linear-gradient(135deg,#38BDF8,#34D399)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{ov}<span style={{fontSize:22}}>%</span></div>

      {plans.map(plan=>{

        const dt=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
        const pct=pts.length>0?Math.round(dt.length/pts.length*100):0;
        const st=getPlanStatus(plan,progress);
        const byS={};pts.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(dt.includes(id))byS[s].d++;});
        return(
          <Card key={plan.id} style={{padding:"16px",marginBottom:12}}>

              {Object.entries(byS).map(([s,{t,d}])=>(
                <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:COL[s],width:14,flexShrink:0}}>{SUBJ_ICON[s]}</span>
                  <span style={{fontSize:12,width:84,textTransform:"capitalize",color:"#94A3B8",flexShrink:0}}>{s}</span>
                  <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={4}/></div>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:34,textAlign:"right",flexShrink:0}}>{d}/{t}</span>
                </div>
              ))}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

  const[pomoCount,setPomoCount]=useState(0);
  const[earnedBadges,setEarnedBadges]=useState([]);
  const[viewing,setViewing]=useState(null);
  const[cert,setCert]=useState(null);
  const[extPlan,setExtPlan]=useState(null);
  const[focusSession,setFocusSession]=useState(null); // {topic,planId,topicId,planName,isExpired}
  const[syncing,setSyncing]=useState(false);
  const[newBadgeToast,setNewBadgeToast]=useState(null);
  const unsubRef=useRef(null);
  const savingRef=useRef(false); // prevent listener double-update

  useEffect(()=>{
    if(window._fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);window.addEventListener("fbReady",h);return()=>window.removeEventListener("fbReady",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const unsub=window._fb.onAuth(async u=>{
      setUser(u);setAuthLoading(false);
      if(u){
        setSyncing(true);
        const data=await window._fb.load(u.uid);
        if(data){
          if(data.plans)setPlans(data.plans);
          if(data.progress)setProgress(data.progress);
          if(data.xp!=null)setXp(data.xp);
          if(data.streak!=null)setStreak(data.streak);
          if(data.lastStudy)setLastStudy(data.lastStudy);
          if(data.pomoCount!=null)setPomoCount(data.pomoCount);
          if(data.earnedBadges)setEarnedBadges(data.earnedBadges);
        } else {
          const lp=LS.get("jee_plans_v4"),lpr=LS.get("jee_progress_v4");
          if(lp)setPlans(lp);if(lpr)setProgress(lpr);
        }
        setSyncing(false);
        if(unsubRef.current)unsubRef.current();
        unsubRef.current=window._fb.listen(u.uid,d=>{
          if(savingRef.current)return; // ignore our own save echo
          if(d.plans)setPlans(d.plans);if(d.progress)setProgress(d.progress);
          if(d.xp!=null)setXp(d.xp);if(d.streak!=null)setStreak(d.streak);
          if(d.pomoCount!=null)setPomoCount(d.pomoCount);
          if(d.earnedBadges)setEarnedBadges(d.earnedBadges);
        });
      } else {if(unsubRef.current){unsubRef.current();unsubRef.current=null;}}
    });
    return()=>unsub();
  },[fbReady]);

  const syncToCloud=useCallback(async(payload)=>{
    savingRef.current=true;
    LS.set("jee_plans_v4",payload.plans);LS.set("jee_progress_v4",payload.progress);
    if(user){
      try{await window._fb.save(user.uid,{...payload,updatedAt:new Date().toISOString()});}
      catch(e){console.error("Sync error",e);}
    }
    setTimeout(()=>{savingRef.current=false;},2000);
  },[user]);

  const savePlans=async np=>{
    setPlans(np);
    await syncToCloud({plans:np,progress,xp,streak,lastStudy,pomoCount,earnedBadges});
  };

  const applyXPAndBadges=(nxp,nstreak,nls,npr,npc,nplans)=>{
    const nb=checkBadges({xp:nxp,streak:nstreak,earnedBadges,plans:nplans||plans,progress:npr||progress,pomoCount:npc!=null?npc:pomoCount});
    const newOnes=nb.filter(id=>!earnedBadges.includes(id));
    if(newOnes.length>0){
      const def=BADGE_DEFS.find(b=>b.id===newOnes[0]);
      if(def){setNewBadgeToast(def);setTimeout(()=>setNewBadgeToast(null),3500);}
    }
    return nb;
  };

  const onToggle=async(planId,date,topicId)=>{
    // FIXED: check current state before updating to prevent double-XP
    const was=!!(progress[planId]?.[date]?.[topicId]);
    const npr={...progress};
    if(!npr[planId])npr[planId]={};
    if(!npr[planId][date])npr[planId][date]={};
    npr[planId][date][topicId]=!was;

    // XP calculation — fixed, no ambiguity
    const plan=plans.find(p=>p.id===planId);
    const isExpired=plan&&plan.endDate<TODAY;
    let nxp=xp;
    if(!was){nxp+=isExpired?XP.TOPIC_LATE:XP.TOPIC_ONTIME;}
    else{nxp=Math.max(0,nxp-XP.UNCHECK);}

    // Streak — only update when checking, not unchecking
    let ns=streak,nls=lastStudy;
    if(!was){
      if(lastStudy===addDays(TODAY,-1)){ns=streak+1;nls=TODAY;}
      else if(lastStudy!==TODAY){ns=1;nls=TODAY;}
    }

    // Plan completion bonus — only when checking, and only when truly 100%
    let planCompleted=false;
    if(!was&&plan){
      const all=[...new Set(Object.values(plan.schedule||{}).flat())];
      const done=[...new Set(Object.values(npr[planId]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
      if(done.length===all.length&&!isExpired){nxp+=XP.PLAN_COMPLETE;planCompleted=true;}
    }

    nxp=Math.max(0,nxp);
    const nb=applyXPAndBadges(nxp,ns,nls,npr,null,null);

    setProgress(npr);setXp(nxp);setStreak(ns);setLastStudy(nls);setEarnedBadges(nb);
    await syncToCloud({plans,progress:npr,xp:nxp,streak:ns,lastStudy:nls,pomoCount,earnedBadges:nb});

    if(planCompleted)setTimeout(()=>setCert(plan),400);
  };

  const onPomoComplete=useCallback(async()=>{
    const npc=pomoCount+1;
    const nxp=xp+XP.POMO_SESSION;
    const nb=applyXPAndBadges(nxp,streak,lastStudy,null,npc,null);
    setPomoCount(npc);setXp(nxp);setEarnedBadges(nb);
    await syncToCloud({plans,progress,xp:nxp,streak,lastStudy,pomoCount:npc,earnedBadges:nb});
  },[pomoCount,xp,streak,lastStudy,plans,progress,earnedBadges]);

  const onFocusComplete=async(planId,topicId)=>{
    setFocusSession(null);
    // Mark topic done if not already done
    const was=!!(progress[planId]?.[TODAY]?.[topicId]);
    if(!was)await onToggle(planId,TODAY,topicId);
  };

  const onForceQuit=async()=>{
    setFocusSession(null);
    const nxp=Math.max(0,xp-XP.FORCE_QUIT_PENALTY);
    setXp(nxp);
    await syncToCloud({plans,progress,xp:nxp,streak,lastStudy,pomoCount,earnedBadges});
  };

  const onDelete=async id=>{
    const np=plans.filter(p=>p.id!==id);
    const npr={...progress};delete npr[id];
    setPlans(np);setProgress(npr);
    await syncToCloud({plans:np,progress:npr,xp,streak,lastStudy,pomoCount,earnedBadges});
    if(viewing?.id===id)setViewing(null);
  };

  const onExtend=async(planId,newEnd)=>{
    const np=plans.map(p=>{if(p.id!==planId)return p;return{...p,endDate:newEnd,schedule:buildSchedule(p.selectedTopics||[],p.startDate,newEnd)};});
    setExtPlan(null);await savePlans(np);
  };

  if(!fbReady||authLoading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,flexDirection:"column",gap:14,color:T.muted}}>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:24,color:T.accent}} className="pulse">JEE 2027</div>
      <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",opacity:0.5}}>Loading…</div>
    </div>
  );

  if(!user)return <LoginScreen onLogin={async()=>{setSignInLoading(true);try{await window._fb.signIn();}catch(e){console.error(e);}setSignInLoading(false);}} loading={signInLoading}/>;

  const TABS=[{k:"today",icon:"◉",lbl:"Today"},{k:"plans",icon:"◧",lbl:"Plans"},{k:"create",icon:"⊕",lbl:"New"},{k:"progress",icon:"◈",lbl:"Progress"}];

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:T.bg,paddingBottom:80,position:"relative"}}>
      <div style={{position:"fixed",top:-80,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(10,15,30,0.92)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(56,189,248,0.08)",padding:"12px 16px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,letterSpacing:2.5,textTransform:"uppercase",marginBottom:2}}>JEE 2027 · Full Control Mode</div>
            <div style={{fontWeight:900,fontSize:18,color:T.text,letterSpacing:-0.5}}>{viewing?viewing.name:({today:"Today's Tasks",plans:"My Plans",create:"New Plan",progress:"Progress"}[tab])}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {syncing&&<div style={{width:16,height:16,border:"2px solid rgba(56,189,248,0.3)",borderTopColor:T.accent,borderRadius:"50%"}} className="spin"/>}
            <img src={user.photoURL||""} onError={e=>{e.target.style.display="none";}} style={{width:30,height:30,borderRadius:"50%",border:"2px solid rgba(56,189,248,0.3)",cursor:"pointer"}} onClick={()=>{if(confirm("Sign out?"))window._fb.signOut();}} title="Sign out"/>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"14px 12px 8px",position:"relative",zIndex:1}}>
        {viewing?(
          <PlanDetail plan={viewing} progress={progress} onToggle={onToggle} onBack={()=>setViewing(null)} onStartFocus={setFocusSession}/>
        ):(
          <>
            {tab==="today"&&<TodayView plans={plans} progress={progress} onToggle={onToggle} streak={streak} xp={xp} onStartFocus={setFocusSession}/>}
            {tab==="plans"&&<PlansView plans={plans} progress={progress} onDelete={onDelete} onView={(p,c)=>{c?setCert(p):setViewing(p);}} onExtend={setExtPlan} onStartFocus={setFocusSession}/>}
            {tab==="create"&&<CreateView onSave={async plan=>{await savePlans([...plans,plan]);setTab("plans");}}/>}
            {tab==="progress"&&<ProgressView plans={plans} progress={progress} xp={xp} streak={streak} earnedBadges={earnedBadges} pomoCount={pomoCount}/>}
          </>
        )}
      </div>

      {/* Bottom Nav */}
      {!viewing&&!focusSession&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(10,15,30,0.96)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(56,189,248,0.08)",display:"flex",justifyContent:"space-around",padding:"8px 0 14px",zIndex:30}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 12px",color:tab===t.k?T.accent:T.muted,fontWeight:tab===t.k?700:400,fontSize:9,letterSpacing:0.8,textTransform:"uppercase",fontFamily:"'Space Mono',monospace",userSelect:"none",transition:"color 0.15s"}}>
              <span style={{fontSize:18,lineHeight:1.1,fontFamily:"monospace"}}>{t.icon}</span>{t.lbl}
            </button>
          ))}
        </div>
      )}

      {/* Focus Mode */}
      {focusSession&&(
        <FocusMode
          topic={focusSession.topic}
          planName={focusSession.planName}
          isExpired={focusSession.isExpired}
          onComplete={()=>onFocusComplete(focusSession.planId,focusSession.topicId)}
          onForceQuit={onForceQuit}
          onXP={onPomoComplete}
        />
      )}

      {/* Modals */}
      {cert&&<Certificate plan={cert} progress={progress} onClose={()=>setCert(null)}/>}
      {extPlan&&<ExtendModal plan={extPlan} onExtend={onExtend} onClose={()=>setExtPlan(null)}/>}

      {/* Badge toast */}
      {newBadgeToast&&(
        <div className="pop" style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"rgba(15,25,50,0.98)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:14,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>
          <span style={{fontSize:28}}>{newBadgeToast.icon}</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.accent,letterSpacing:1}}>BADGE UNLOCKED!</div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{newBadgeToast.name}</div><div style={{fontSize:11,color:T.muted}}>{newBadgeToast.desc}</div></div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
// PWA Service Worker
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='jee-planner-v3';
    const ASSETS=['./','/JEE-Planner/','/JEE-Planner/index.html'];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})));self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));});
    self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
