function computeXP(plans,progress,pomoCount=0){
  let xp=0;
  plans.forEach(plan=>{
    const isExpired=plan.endDate<TODAY;
    const allIds=[...new Set(Object.values(plan.schedule||{}).flat())];
    const doneIds=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
    doneIds.forEach(tid=>{if(allIds.includes(tid))xp+=isExpired?XP_RATES.TOPIC_LATE:XP_RATES.TOPIC_ONTIME;});
    if(!isExpired&&doneIds.length===allIds.length&&allIds.length>0)xp+=XP_RATES.PLAN_COMPLETE;
  });
  xp+=Math.max(0,pomoCount)*XP_RATES.POMO_SESSION;
  return Math.max(0,xp);
}

function computeBadges(state){
  const{xp,streak,plans,progress,pomoCount=0,earnedBadges=[]}=state;
  const nb=[...earnedBadges];
  const add=id=>{if(!nb.includes(id))nb.push(id);};
  const totalDone=plans.flatMap(p=>Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v))).length;
  if(totalDone>=1)add("first_topic");
  if(streak>=3)add("streak3");if(streak>=7)add("streak7");if(streak>=14)add("streak14");
  if(xp>=100)add("xp100");if(xp>=500)add("xp500");if(xp>=1500)add("xp1500");
  if(pomoCount>=5)add("pomo5");if(pomoCount>=25)add("pomo25");
  plans.forEach(p=>{
    const allIds=[...new Set(Object.values(p.schedule||{}).flat())];
    const doneIds=[...new Set(Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
    if(allIds.length>0&&doneIds.length===allIds.length)add("first_plan");

    const mathT=allIds.filter(id=>ALL_MAP[id]?.subj==="maths");

const addDays=(ds,n)=>{const[y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d+n);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const getDOW=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const fmtDate=(ds,opts={})=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',...opts});};
const fmtLong=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
const TODAY=(()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;})();

function getPlanStatus(plan,progress){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  if(all.length>0&&done.length===all.length)return"completed";
  if(plan.endDate<TODAY)return"expired";
  if(plan.startDate>TODAY)return"upcoming";
  return"active";
}

function buildSchedule(ids,start,end){
  const topics=ids.map(id=>ALL_MAP[id]).filter(Boolean);if(!topics.length)return{};
  const days=[];let ds=start;while(ds<=end){days.push(ds);ds=addDays(ds,1);}
  const total=topics.length,td=days.length;
  const base=Math.max(1,Math.floor(total/td)),extra=total-base*td;
  const quota=days.map((_,i)=>i<extra?base+1:base);
  const byS={};topics.forEach(t=>{if(!byS[t.subj])byS[t.subj]=[];byS[t.subj].push(t);});
  const sk=Object.keys(byS);const il=[];let si=0,sf=0;
  while(il.length<total&&sf<total*3){sf++;const s=sk[si%sk.length];if(byS[s]&&byS[s].length>0)il.push(byS[s].shift());si++;}
  let pool=[...il];const sched={};
  for(let i=0;i<days.length;i++){
    const date=days[i],q=quota[i];if(!pool.length){sched[date]=[];continue;}
    const cs=COACHING[getDOW(date)];const la=Math.min(pool.length,q*2);
    const ai=cs.subj?pool.slice(0,la).findIndex(t=>t.subj===cs.subj&&(!cs.sec||t.sec===cs.sec)):-1;
    if(ai>0){const[a]=pool.splice(ai,1);pool.unshift(a);}
    sched[date]=pool.splice(0,q).map(t=>t.id);
  }
  return sched;
}

}

function beep(freq=880,dur=0.4){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}
}

function SBadge({status}){const m={active:{c:"#38BDF8",l:"ACTIVE"},completed:{c:"#34D399",l:"COMPLETED"},expired:{c:"#EF4444",l:"EXPIRED"},upcoming:{c:"#FBBF24",l:"UPCOMING"}};const s=m[status]||m.active;return <span style={{fontSize:9,fontWeight:700,letterSpacing:1,background:`${s.c}18`,color:s.c,borderRadius:20,padding:"3px 9px",fontFamily:"'Space Mono',monospace"}}>{s.l}</span>;}

function FocusMode({topic,planName,onComplete,onForceQuit,onPomoComplete,onFocusMinute,pomoSettings}){
  const{workMin=25,shortMin=5,longMin=15}=pomoSettings;
  const[timeLeft,setTimeLeft]=useState(workMin*60);
  const[running,setRunning]=useState(false);
  const[phase,setPhase]=useState("work");
  const[session,setSession]=useState(0);
  const[showBreak,setShowBreak]=useState(false);
  const[showQuit,setShowQuit]=useState(false);
  const[sessionsDone,setSessionsDone]=useState(0);
  const pausedRef=useRef(false);
  const color=COL[topic?.subj]||T.accent;
  const phaseColor=phase==="work"?color:phase==="short"?"#34D399":"#A78BFA";

  useEffect(()=>{
    const onVis=()=>{
      if(document.hidden){pausedRef.current=running;setRunning(false);}
      else if(pausedRef.current){setRunning(true);pausedRef.current=false;}
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[running]);

  useEffect(()=>{
    if(!running)return;
    const id=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){
          clearInterval(id);setRunning(false);
          beep(660,0.4);setTimeout(()=>beep(880,0.5),500);setTimeout(()=>beep(1100,0.6),1000);
          if(phase==="work"){
            const ns=session+1;setSession(ns);setSessionsDone(s=>s+1);
            onPomoComplete&&onPomoComplete();
            const np=ns%4===0?"long":"short";
            setPhase(np);setTimeLeft(np==="long"?longMin*60:shortMin*60);
            setShowBreak(true);
          } else {setPhase("work");setTimeLeft(workMin*60);}
          return 0;
        }
        return t-1;
      });
    },1000);
    return()=>clearInterval(id);
  },[running,phase,session,workMin,shortMin,longMin]);

  const total=phase==="work"?workMin*60:phase==="short"?shortMin*60:longMin*60;
  const pct=((total-timeLeft)/total)*100;
  const circ=2*Math.PI*54;
  const dash=circ*(1-pct/100);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const skip=()=>{setRunning(false);if(phase==="work"){const ns=session+1;setSession(ns);const np=ns%4===0?"long":"short";setPhase(np);setTimeLeft(np==="long"?longMin*60:shortMin*60);}else{setPhase("work");setTimeLeft(workMin*60);}};

  return(
    <div style={{position:"fixed",inset:0,background:"#04060F",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,overflow:"hidden"}}>

function Certificate({plan,progress,onClose}){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  const pct=all.length>0?Math.round(done.length/all.length*100):0;
  const byS={};all.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(done.includes(id))byS[s].d++;});
  useEffect(()=>{if(pct===100)spawnConfetti();},[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div className="pop" style={{background:"linear-gradient(135deg,#0F2044,#1a3a6b)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:24,padding:"32px 24px",maxWidth:400,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>{pct===100?"🏆":"📋"}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.accent,letterSpacing:2,marginBottom:6}}>{pct===100?"PLAN COMPLETED!":"PLAN SUMMARY"}</div>
        <div style={{fontWeight:900,fontSize:20,color:T.text,marginBottom:4}}>{plan.name}</div>
        <div style={{fontSize:11,color:T.muted,marginBottom:20,fontFamily:"'Space Mono',monospace"}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:52,fontWeight:700,lineHeight:1,background:`linear-gradient(135deg,${pct===100?"#34D399,#38BDF8":"#FBBF24,#F87171"})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{pct}<span style={{fontSize:22}}>%</span></div>
        <div style={{fontSize:12,color:T.muted,marginBottom:20}}>{done.length} of {all.length} topics completed</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {Object.entries(byS).map(([s,{t,d}])=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:COL[s],width:14}}>{SUBJ_ICON[s]}</span>
              <span style={{fontSize:12,width:84,textTransform:"capitalize",color:"#94A3B8"}}>{s}</span>
              <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={5}/></div>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:30,textAlign:"right"}}>{d}/{t}</span>
            </div>
          ))}
        </div>
        {pct===100&&<div style={{background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:10,padding:"10px",marginBottom:16,fontSize:12,color:"#34D399"}}>+{XP_RATES.PLAN_COMPLETE} XP earned! 🎉</div>}
        <button onClick={onClose} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#0EA5E9,#38BDF8)",color:"#0A0F1E",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Close</button>
      </div>
    </div>
  );
}

        </Card>
        <Card style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:8,minWidth:88}}>
          <span style={{fontSize:18}}>🎯</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#F87171",letterSpacing:1}}>JEE</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{daysLeft}d</div></div>

      <Card glow style={{padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:1.5,marginBottom:4}}>TODAY</div>
            <div style={{fontWeight:800,fontSize:14,color:T.text,lineHeight:1.3}}>{fmtLong(TODAY)}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>Coaching: <span style={{color:T.accent,fontWeight:700}}>{cs.label}</span></div>
          </div>
          {tasks.length>0&&<div style={{textAlign:"right"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,lineHeight:1,color:pct===100?"#34D399":T.accent}}>{pct}<span style={{fontSize:14}}>%</span></div><div style={{fontSize:10,color:T.muted}}>{doneCount}/{tasks.length}</div></div>}

                <div style={{fontWeight:700,fontSize:14,color:t.done?"#34D399":T.text,textDecoration:t.done?"line-through":"none",opacity:t.done?0.7:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.ch?.name}</div>

function PlansView({plans,progress,onDelete,onView,onExtend,onStartFocus}){
  const[tab,setTab]=useState("active");
  const active=plans.filter(p=>["active","upcoming"].includes(getPlanStatus(p,progress)));
  const arch=plans.filter(p=>["completed","expired"].includes(getPlanStatus(p,progress)));
  const show=tab==="active"?active:arch;
  if(!plans.length)return <div style={{textAlign:"center",color:T.muted,paddingTop:70}} className="fade-up"><div style={{fontSize:52,opacity:0.2,fontFamily:"'Space Mono',monospace"}}>[ ]</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.5}}>No plans yet.<br/>Tap <b style={{color:T.accent}}>New</b> to create one.</div></div>;
  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["active",`Active (${active.length})`],["archive",`Archive (${arch.length})`]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px",borderRadius:10,border:`1.5px solid ${tab===k?T.accent:"rgba(255,255,255,0.08)"}`,background:tab===k?"rgba(56,189,248,0.1)":"rgba(255,255,255,0.03)",color:tab===k?T.accent:T.muted,fontWeight:700,cursor:"pointer",fontSize:11,fontFamily:"'Space Mono',monospace"}}>{l}</button>
        ))}
      </div>
      {!show.length?<div style={{textAlign:"center",color:T.muted,paddingTop:40,fontSize:13,opacity:0.5}}>{tab==="active"?"No active plans.":"No archived plans yet."}</div>
      :show.map(plan=>{
        const all=[...new Set(Object.values(plan.schedule||{}).flat())];
        const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
        const pct=all.length>0?Math.round(done.length/all.length*100):0;
        const st=getPlanStatus(plan,progress);
        const todayT=plan.schedule?.[TODAY]||[];
        return(
          <Card key={plan.id} style={{padding:"18px",marginBottom:12}} glow={st==="active"&&pct>0&&pct<100}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,minWidth:0,marginRight:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <div style={{fontWeight:800,fontSize:15,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{plan.name}</div>
                  <SBadge status={st}/>
                </div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)} · {plan.dailyHours}h/day</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:26,fontWeight:700,lineHeight:1,color:st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}}>{pct}<span style={{fontSize:12}}>%</span></div>
                <div style={{fontSize:10,color:T.muted}}>{done.length}/{all.length}</div>
              </div>
            </div>
            <Bar pct={pct} color={st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}/>
            <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>{(plan.subjects||[]).map(s=><Tag key={s} label={s} color={COL[s]}/>)}</div>
            {st==="active"&&todayT.length>0&&<div style={{marginTop:10,fontSize:11,color:T.muted,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:10,lineHeight:1.7}}><span style={{color:T.accent,fontWeight:700}}>Today → </span>{todayT.map(id=>ALL_MAP[id]?.name).filter(Boolean).join(" · ")}</div>}
            {st==="expired"&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,fontSize:11,color:"#EF4444"}}>⚠️ Expired — {all.length-done.length} topics incomplete</div>}
            <div style={{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}}>
              <button onClick={()=>onView(plan,false)} style={{fontSize:11,color:T.accent,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>View Schedule →</button>
              {(st==="completed"||st==="expired")&&<button onClick={()=>onView(plan,true)} style={{fontSize:11,color:"#34D399",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📋 Summary</button>}
              {st==="expired"&&<button onClick={()=>onExtend(plan)} style={{fontSize:11,color:"#FBBF24",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📅 Extend</button>}
              <button onClick={()=>onDelete(plan.id)} style={{fontSize:11,color:"#EF4444",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"'DM Sans',sans-serif"}}>Delete</button>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function PlanDetail({plan,progress,onToggle,onBack,onStartFocus}){
  const entries=Object.entries(plan.schedule||{});
  const isDone=(pid,date,tid)=>!!(progress[pid]?.[date]?.[tid]);
  const st=getPlanStatus(plan,progress);
  return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>‹</button>
        <div style={{fontWeight:800,fontSize:16,color:T.text,flex:1}}>{plan.name}</div>
        <SBadge status={st}/>
      </div>
      {entries.map(([date,ids])=>{
        const dow=getDOW(date),isPast=date<TODAY,isToday=date===TODAY;
        const allDone=ids.length>0&&ids.every(id=>isDone(plan.id,date,id));
        return(
          <div key={date} style={{background:isToday?"rgba(56,189,248,0.06)":allDone?"rgba(52,211,153,0.04)":"rgba(15,25,50,0.6)",border:`1px solid ${isToday?"rgba(56,189,248,0.2)":allDone?"rgba(52,211,153,0.15)":"rgba(255,255,255,0.05)"}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ids.length?8:0}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:isToday?T.accent:isPast?"#475569":"#94A3B8"}}>{isToday?"▶ ":""}{fmtDate(date)}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {ids.length>0&&<span style={{fontSize:9,background:"rgba(255,255,255,0.06)",color:T.muted,borderRadius:6,padding:"2px 7px",fontFamily:"'Space Mono',monospace",fontWeight:700}}>{ids.length} topics</span>}
                <span style={{fontSize:10,color:T.muted}}>{COACHING[dow].label}</span>
              </div>
            </div>
            {!ids.length?<div style={{fontSize:11,color:"#334155"}}>Buffer / Rest</div>:ids.map(id=>{
              const ch=ALL_MAP[id],d=isDone(plan.id,date,id),c=COL[ch?.subj]||"#94A3B8";
              return(
                <div key={id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

}

function ProgressView({plans,progress,xp,streak,earnedBadges=[],pomoCount=0}){

  const allD=plans.flatMap(p=>[...new Set(Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))]);
  const ov=allT.length>0?Math.round(allD.length/allT.length*100):0;
  if(!plans.length)return <div style={{textAlign:"center",color:T.muted,paddingTop:70}} className="fade-up"><div style={{fontSize:52,opacity:0.2}}>{ "{}" }</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.5}}>No data yet.<br/>Complete tasks to earn XP!</div></div>;

      <Card style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:700,fontSize:14,color:T.text}}>🏅 Badges</div><div style={{fontSize:11,color:T.muted}}>{earnedBadges.length}/{BADGE_DEFS.length}</div></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>

        </div>
      </Card>
      <Card style={{padding:"20px",marginBottom:12,textAlign:"center"}}>

        const pct=pts.length>0?Math.round(dt.length/pts.length*100):0;
        const st=getPlanStatus(plan,progress);
        const byS={};pts.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(dt.includes(id))byS[s].d++;});

                  <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={4}/></div>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:34,textAlign:"right",flexShrink:0}}>{d}/{t}</span>
                </div>
              ))}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

      <Card className="pop" style={{padding:"24px",maxWidth:380,width:"100%"}}>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:4}}>Extend Plan</div>
        <div style={{fontSize:12,color:T.muted,marginBottom:20}}>{plan.name} — ends {fmtDate(plan.endDate)}</div>
        <label style={{display:"block",fontSize:10,fontWeight:700,color:T.muted,marginBottom:7,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'Space Mono',monospace"}}>NEW END DATE</label>
        <input type="date" value={newEnd} min={addDays(TODAY,1)} onChange={e=>setNewEnd(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,fontSize:14,outline:"none",display:"block",marginBottom:16}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",color:T.muted,border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Cancel</button>
          <button onClick={()=>newEnd&&onExtend(plan.id,newEnd)} disabled={!newEnd} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#0EA5E9,#38BDF8)",color:"#0A0F1E",border:"none",borderRadius:10,cursor:newEnd?"pointer":"default",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",opacity:newEnd?1:0.5}}>Extend Plan</button>
        </div>
      </Card>
    </div>
  );
}

function LoginScreen({onLogin,loading}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,background:T.bg}}>
      <div style={{position:"fixed",top:-80,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{textAlign:"center",marginBottom:48}} className="fade-up">
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:T.muted,letterSpacing:3,marginBottom:12}}>JEE 2027</div>
        <div style={{fontWeight:900,fontSize:32,color:T.text,letterSpacing:-1,lineHeight:1.2,marginBottom:12}}>Full Control<br/>Mode</div>
        <div style={{fontSize:13,color:T.muted,lineHeight:1.8}}>Study planner + Focus mode.<br/>Sync across all devices.</div>
      </div>
      <Card style={{width:"100%",maxWidth:360,padding:"28px 24px"}} glow>
        <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:44,marginBottom:8}}>🎯</div><div style={{fontWeight:700,fontSize:16,color:T.text,marginBottom:4}}>Welcome, sir</div><div style={{fontSize:12,color:T.muted}}>Sign in to access your plans</div></div>
        <button onClick={onLogin} disabled={loading} style={{width:"100%",padding:"14px 20px",background:"white",color:"#1E293B",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"'DM Sans',sans-serif",opacity:loading?0.7:1}}>
          {loading?<div style={{width:20,height:20,border:"2.5px solid #CBD5E1",borderTopColor:"#1E293B",borderRadius:"50%"}} className="spin"/>:<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>}
          {loading?"Signing in…":"Continue with Google"}
        </button>
        <div style={{textAlign:"center",fontSize:11,color:T.muted,marginTop:14,lineHeight:1.7}}>Syncs across phone &amp; PC · Free forever</div>
      </Card>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[signInLoading,setSignInLoading]=useState(false);
  const[fbReady,setFbReady]=useState(!!window._fbReady);
  const[tab,setTab]=useState("today");
  const[plans,setPlans]=useState([]);
  const[progress,setProgress]=useState({});
  const[streak,setStreak]=useState(0);
  const[lastStudy,setLastStudy]=useState(null);
  const[pomoCount,setPomoCount]=useState(0);
  const[earnedBadges,setEarnedBadges]=useState([]);
  const[focusMinutes,setFocusMinutes]=useState({});
  const[pomoSettings,setPomoSettings]=useState({workMin:25,shortMin:5,longMin:15});
  const[viewing,setViewing]=useState(null);
  const[cert,setCert]=useState(null);
  const[extPlan,setExtPlan]=useState(null);
  const[focusSession,setFocusSession]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[badgeToast,setBadgeToast]=useState(null);
  const unsubRef=useRef(null);
  const savingRef=useRef(false);
  const xp=useMemo(()=>computeXP(plans,progress,pomoCount),[plans,progress,pomoCount]);

  useEffect(()=>{
    if(window._fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);window.addEventListener("fbReady",h);return()=>window.removeEventListener("fbReady",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const unsub=window._fb.onAuth(async u=>{
      setUser(u);setAuthLoading(false);
      if(u){
        setSyncing(true);
        const data=await window._fb.load(u.uid);
        if(data){
          if(data.plans)setPlans(data.plans);
          if(data.progress)setProgress(data.progress);
          if(data.streak!=null)setStreak(data.streak);
          if(data.lastStudy)setLastStudy(data.lastStudy);
          if(data.pomoCount!=null)setPomoCount(data.pomoCount);
          if(data.earnedBadges)setEarnedBadges(data.earnedBadges);
          if(data.focusMinutes)setFocusMinutes(data.focusMinutes);
          if(data.pomoSettings)setPomoSettings(data.pomoSettings);
        } else {
          const lp=LS.get("jee_plans_v4"),lpr=LS.get("jee_progress_v4");
          if(lp)setPlans(lp);if(lpr)setProgress(lpr);
        }
        setSyncing(false);
        if(unsubRef.current)unsubRef.current();
        unsubRef.current=window._fb.listen(u.uid,d=>{
          if(savingRef.current)return;
          if(d.plans)setPlans(d.plans);if(d.progress)setProgress(d.progress);
          if(d.streak!=null)setStreak(d.streak);
          if(d.pomoCount!=null)setPomoCount(d.pomoCount);
          if(d.earnedBadges)setEarnedBadges(d.earnedBadges);
          if(d.focusMinutes)setFocusMinutes(d.focusMinutes);
          if(d.pomoSettings)setPomoSettings(d.pomoSettings);
        });
      } else {if(unsubRef.current){unsubRef.current();unsubRef.current=null;}}
    });
    return()=>unsub();
  },[fbReady]);

  const sync=useCallback(async(payload)=>{
    savingRef.current=true;
    LS.set("jee_plans_v4",payload.plans||plans);
    LS.set("jee_progress_v4",payload.progress||progress);
    if(user){try{await window._fb.save(user.uid,{...payload,updatedAt:new Date().toISOString()});}catch(e){console.error(e);}}
    setTimeout(()=>{savingRef.current=false;},2000);
  },[user,plans,progress]);

  const checkAndToastBadges=(nb,old)=>{
    const newOnes=nb.filter(id=>!old.includes(id));
    if(newOnes.length>0){const def=BADGE_DEFS.find(b=>b.id===newOnes[0]);if(def){setBadgeToast(def);setTimeout(()=>setBadgeToast(null),3500);}}
  };

  const onToggle=async(planId,date,topicId)=>{
    const was=!!(progress[planId]?.[date]?.[topicId]);
    const npr={...progress};
    if(!npr[planId])npr[planId]={};
    if(!npr[planId][date])npr[planId][date]={};
    npr[planId][date][topicId]=!was;
    let ns=streak,nls=lastStudy;
    if(!was){
      if(lastStudy===addDays(TODAY,-1)){ns=streak+1;nls=TODAY;}
      else if(lastStudy!==TODAY){ns=1;nls=TODAY;}
    }
    const newXp=computeXP(plans,npr,pomoCount);
    const nb=computeBadges({xp:newXp,streak:ns,plans,progress:npr,pomoCount,earnedBadges});
    checkAndToastBadges(nb,earnedBadges);
    const plan=plans.find(p=>p.id===planId);
    let planDone=false;
    if(!was&&plan){
      const allIds=[...new Set(Object.values(plan.schedule||{}).flat())];
      const doneIds=[...new Set(Object.values(npr[planId]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
      if(doneIds.length===allIds.length&&allIds.length>0&&plan.endDate>=TODAY)planDone=true;
    }
    setProgress(npr);setStreak(ns);setLastStudy(nls);setEarnedBadges(nb);
    await sync({plans,progress:npr,streak:ns,lastStudy:nls,pomoCount,earnedBadges:nb,focusMinutes,pomoSettings});
    if(planDone)setTimeout(()=>{spawnConfetti();setCert(plan);},400);
  };

  const onPomoComplete=useCallback(async()=>{
    const npc=pomoCount+1;
    const newXp=computeXP(plans,progress,npc);
    const nb=computeBadges({xp:newXp,streak,plans,progress,pomoCount:npc,earnedBadges});
    checkAndToastBadges(nb,earnedBadges);
    setPomoCount(npc);setEarnedBadges(nb);
    await sync({plans,progress,streak,lastStudy,pomoCount:npc,earnedBadges:nb,focusMinutes,pomoSettings});
  },[pomoCount,streak,lastStudy,plans,progress,earnedBadges,focusMinutes,pomoSettings]);

  const onFocusMinute=useCallback(async(mins)=>{
    const nfm={...focusMinutes,[TODAY]:(focusMinutes[TODAY]||0)+mins};
    setFocusMinutes(nfm);
    await sync({plans,progress,streak,lastStudy,pomoCount,earnedBadges,focusMinutes:nfm,pomoSettings});
  },[focusMinutes,plans,progress,streak,lastStudy,pomoCount,earnedBadges,pomoSettings]);

  const onFocusComplete=async(planId,topicId)=>{
    setFocusSession(null);
    const was=!!(progress[planId]?.[TODAY]?.[topicId]);
    if(!was)await onToggle(planId,TODAY,topicId);
  };

  const savePlans=async np=>{
    setPlans(np);
    const nb=computeBadges({xp:computeXP(np,progress,pomoCount),streak,plans:np,progress,pomoCount,earnedBadges});
    setEarnedBadges(nb);
    await sync({plans:np,progress,streak,lastStudy,pomoCount,earnedBadges:nb,focusMinutes,pomoSettings});
  };

  const onDelete=async id=>{
    const np=plans.filter(p=>p.id!==id);const npr={...progress};delete npr[id];
    setPlans(np);setProgress(npr);
    await sync({plans:np,progress:npr,streak,lastStudy,pomoCount,earnedBadges,focusMinutes,pomoSettings});
    if(viewing?.id===id)setViewing(null);
  };

  const onExtend=async(planId,newEnd)=>{
    const np=plans.map(p=>{if(p.id!==planId)return p;return{...p,endDate:newEnd,schedule:buildSchedule(p.selectedTopics||[],p.startDate,newEnd)};});
    setExtPlan(null);await savePlans(np);
  };

  const savePomoSettings=async ns=>{
    setPomoSettings(ns);
    await sync({plans,progress,streak,lastStudy,pomoCount,earnedBadges,focusMinutes,pomoSettings:ns});
  };

  if(!fbReady||authLoading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,flexDirection:"column",gap:14,color:T.muted}}>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:24,color:T.accent}} className="pulse">JEE 2027</div>
      <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",opacity:0.5}}>Loading…</div>
    </div>
  );

  if(!user)return <LoginScreen onLogin={async()=>{setSignInLoading(true);try{await window._fb.signIn();}catch(e){console.error(e);}setSignInLoading(false);}} loading={signInLoading}/>;

  const TABS=[{k:"today",icon:"◉",lbl:"Today"},{k:"plans",icon:"◧",lbl:"Plans"},{k:"create",icon:"⊕",lbl:"New"},{k:"progress",icon:"◈",lbl:"Progress"},{k:"settings",icon:"◎",lbl:"Profile"}];

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:T.bg,paddingBottom:84,position:"relative"}}>
      <div style={{position:"fixed",top:-80,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(10,15,30,0.92)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(56,189,248,0.08)",padding:"12px 16px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,letterSpacing:2.5,textTransform:"uppercase",marginBottom:2}}>JEE 2027 · Full Control Mode</div>
            <div style={{fontWeight:900,fontSize:18,color:T.text,letterSpacing:-0.5}}>{viewing?viewing.name:({today:"Today's Tasks",plans:"My Plans",create:"New Plan",progress:"Progress",settings:"Profile & Settings"}[tab])}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {syncing&&<div style={{width:16,height:16,border:"2px solid rgba(56,189,248,0.3)",borderTopColor:T.accent,borderRadius:"50%"}} className="spin"/>}
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:T.accent,fontWeight:700}}>{xp}XP</div>
          </div>
        </div>
      </div>
      <div style={{padding:"14px 12px 8px",position:"relative",zIndex:1}}>
        {viewing?(
          <PlanDetail plan={viewing} progress={progress} onToggle={onToggle} onBack={()=>setViewing(null)} onStartFocus={setFocusSession}/>
        ):(
          <>
            {tab==="today"&&<TodayView plans={plans} progress={progress} onToggle={onToggle} streak={streak} xp={xp} onStartFocus={setFocusSession}/>}
            {tab==="plans"&&<PlansView plans={plans} progress={progress} onDelete={onDelete} onView={(p,c)=>{c?setCert(p):setViewing(p);}} onExtend={setExtPlan} onStartFocus={setFocusSession}/>}
            {tab==="create"&&<CreateView onSave={async plan=>{await savePlans([...plans,plan]);setTab("plans");}}/>}
            {tab==="progress"&&<ProgressView plans={plans} progress={progress} xp={xp} streak={streak} earnedBadges={earnedBadges} pomoCount={pomoCount}/>}
            {tab==="settings"&&<SettingsView user={user} pomoSettings={pomoSettings} setPomoSettings={savePomoSettings} focusMinutes={focusMinutes} streak={streak} pomoCount={pomoCount} xp={xp} onSignOut={()=>{if(confirm("Sign out?"))window._fb.signOut();}}/>}
          </>
        )}
      </div>
      {!viewing&&!focusSession&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(10,15,30,0.96)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(56,189,248,0.08)",display:"flex",justifyContent:"space-around",padding:"8px 0 14px",zIndex:30}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 8px",color:tab===t.k?T.accent:T.muted,fontWeight:tab===t.k?700:400,fontSize:8,letterSpacing:0.8,textTransform:"uppercase",fontFamily:"'Space Mono',monospace",userSelect:"none",transition:"color 0.15s"}}>
              <span style={{fontSize:17,lineHeight:1.1,fontFamily:"monospace"}}>{t.icon}</span>{t.lbl}
            </button>
          ))}
        </div>
      )}
      {focusSession&&<FocusMode topic={focusSession.topic} planName={focusSession.planName} onComplete={()=>onFocusComplete(focusSession.planId,focusSession.topicId)} onForceQuit={()=>setFocusSession(null)} onPomoComplete={onPomoComplete} onFocusMinute={onFocusMinute} pomoSettings={pomoSettings}/>}
      {cert&&<Certificate plan={cert} progress={progress} onClose={()=>setCert(null)}/>}
      {extPlan&&<ExtendModal plan={extPlan} onExtend={onExtend} onClose={()=>setExtPlan(null)}/>}
      {badgeToast&&(
        <div className="slide-in" style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"rgba(15,25,50,0.98)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:14,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",whiteSpace:"nowrap"}}>
          <span style={{fontSize:28}}>{badgeToast.icon}</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.accent,letterSpacing:1}}>BADGE UNLOCKED!</div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{badgeToast.name}</div><div style={{fontSize:11,color:T.muted}}>{badgeToast.desc}</div></div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
