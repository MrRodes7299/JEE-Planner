<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>JEE 2027 — Study Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;}
    body{background:#0A0F1E;font-family:'DM Sans',sans-serif;color:#E2E8F0;overscroll-behavior:none;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:4px;}
    input,button,select{font-family:'DM Sans',sans-serif;}
    input[type="date"]{color-scheme:dark;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes pop{0%{transform:scale(0.7);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
    @keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
    .fade-up{animation:fadeUp 0.3s ease forwards;}
    .pulse{animation:pulse 2s infinite;}
    .pop{animation:pop 0.4s cubic-bezier(.4,0,.2,1) forwards;}
    .spin{animation:spin 0.8s linear infinite;}
    .confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confetti 3s ease-in forwards;pointer-events:none;z-index:9999;}
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
  import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
  const cfg={apiKey:"AIzaSyBfJPLmQY38X86e4rwR1BiqUFnEt_BV8w0",authDomain:"jee-planner-d69a5.firebaseapp.com",projectId:"jee-planner-d69a5",storageBucket:"jee-planner-d69a5.firebasestorage.app",messagingSenderId:"111602958372",appId:"1:111602958372:web:ecb8db737e14595624d8b1"};
  const app=initializeApp(cfg);
  const auth=getAuth(app);
  const db=getFirestore(app);
  const prov=new GoogleAuthProvider();
  window._fb={
    signIn:()=>signInWithPopup(auth,prov),
    signOut:()=>signOut(auth),
    onAuth:(cb)=>onAuthStateChanged(auth,cb),
    save:async(uid,data)=>await setDoc(doc(db,"users",uid),data,{merge:true}),
    load:async(uid)=>{const s=await getDoc(doc(db,"users",uid));return s.exists()?s.data():null;},
    listen:(uid,cb)=>onSnapshot(doc(db,"users",uid),s=>{if(s.exists())cb(s.data());}),
  };
  window._fbReady=true;
  window.dispatchEvent(new Event("fbReady"));
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── DATA ─────────────────────────────────────────────────────────────────────
const COACHING={0:{label:"Free Study",subj:null,sec:null},1:{label:"Organic Chem",subj:"chemistry",sec:"organic"},2:{label:"Physical Chem",subj:"chemistry",sec:"physical"},3:{label:"Physics",subj:"physics",sec:null},4:{label:"Physics",subj:"physics",sec:null},5:{label:"Mathematics",subj:"maths",sec:null},6:{label:"Mathematics",subj:"maths",sec:null}};
const MATHS=["Basics of Mathematics","Set Theory","Logarithms","Quadratic Equations & Expressions","Sequence & Series","Trigonometrical Ratios & Identities","Trigonometrical Equations","Triangle Trigonometry","Determinants","Matrices","Binomial Theorem","Permutations & Combinations","Probability","Straight Line","Pair of Lines","Circle","Parabola","Hyperbola & Ellipse","Complex Numbers","Functions & Graphs","Inverse Trigonometry Functions","Limits","Continuity & Differentiability","Derivatives","Application of Derivatives","Indefinite Integrations","Definite Integration","Area under the Curve","Differential Equation & Applications","Vectors","3-D Geometry","Statistics"].map((n,i)=>({id:`M${String(i+1).padStart(2,'0')}`,name:n,subj:"maths",sec:null}));
const PHYSICS=["Basics of Physics","Straight Line Motion","Projectile Motion","Relative Motion","Force Dynamics","Work Power Energy","Mechanics of Circular Motion","Theory of Collisions","Rotational Mechanics","Gravitation","Simple Harmonic Motion","Mechanical Properties of Solids & Liquids","Fluid Mechanics","Thermometry, Calorimetry & Thermal Expansion","Kinetic Theory of Gases & Thermodynamics","Electrostatics","Theory of Capacitors","Current Electricity","Magnetostatics","Electromagnetic Induction","D.C. Circuits","A.C. Circuits","Geometric Optics","Wave Mechanics","Interference, Diffraction, Polarisation","Heat Transfer","Modern Physics"].map((n,i)=>({id:`P${String(i+1).padStart(2,'0')}`,name:n,subj:"physics",sec:null}));
const CHEM_PHY=["General Chemistry","Stoichiometry","Gas Laws","Chemical Kinetics","Chemical Equilibrium","Ionic Equilibrium","Redox Concepts & Redox Titrations","Thermochemistry & Thermodynamics-1","Thermochemistry & Thermodynamics-2","Electrochemistry","Solutions","Solid State","Surface Chemistry"].map((n,i)=>({id:`CP${String(i+1).padStart(2,'0')}`,name:n,subj:"chemistry",sec:"physical"}));
const CHEM_ORG=["Classification & IUPAC Nomenclature","Structure & Isomerism","Structure & Reactivity","Reaction Mechanisms","Aromatic Compounds","Reactions & Reagents","Hydrocarbons – 1","Hydrocarbons – 2","Halogen Derivatives","Organic Hydroxy Compounds","Ethers & Epoxides","Aldehyde & Ketones","Carboxylic Acids & its Derivatives","Nitrogen containing Compounds","Biomolecules","Polymers"].map((n,i)=>({id:`CO${String(i+1).padStart(2,'0')}`,name:n,subj:"chemistry",sec:"organic"}));
const CHEM_INO=["S-Block Elements","P-Block Elements","Coordination Compounds","D & F Block Elements","Chemical Bonding – 2","Extractive Metallurgy","Inorganic Qualitative Analysis"].map((n,i)=>({id:`CI${String(i+1).padStart(2,'0')}`,name:n,subj:"chemistry",sec:"inorganic"}));
const ALL_MAP={};[...MATHS,...PHYSICS,...CHEM_PHY,...CHEM_ORG,...CHEM_INO].forEach(c=>{ALL_MAP[c.id]=c;});
const COL={maths:"#38BDF8",physics:"#34D399",chemistry:"#FBBF24"};
const COL_IC={organic:"#F87171",physical:"#FBBF24",inorganic:"#A78BFA"};
const SUBJ_ICON={maths:"∑",physics:"⚡",chemistry:"⚗"};
const T={bg:"#0A0F1E",card:"rgba(15,25,50,0.9)",cardBorder:"rgba(56,189,248,0.12)",text:"#E2E8F0",muted:"#64748B",accent:"#38BDF8"};
const XP_TOPIC=10,XP_PLAN=100;

// ── UTILS ─────────────────────────────────────────────────────────────────────
const addDays=(ds,n)=>{const[y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d+n);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const getDOW=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const fmtDate=(ds,opts={})=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',...opts});};
const fmtLong=ds=>{const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
const TODAY=(()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;})();
const LS={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};

function getPlanStatus(plan,progress){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  if(all.length>0&&done.length===all.length)return"completed";
  if(plan.endDate<TODAY)return"expired";
  if(plan.startDate>TODAY)return"upcoming";
  return"active";
}

function buildSchedule(ids,start,end){
  const topics=ids.map(id=>ALL_MAP[id]).filter(Boolean);
  if(!topics.length)return{};
  const days=[];let ds=start;
  while(ds<=end){days.push(ds);ds=addDays(ds,1);}
  const total=topics.length,td=days.length;
  const base=Math.max(1,Math.floor(total/td)),extra=total-base*td;
  const quota=days.map((_,i)=>i<extra?base+1:base);
  const byS={};topics.forEach(t=>{if(!byS[t.subj])byS[t.subj]=[];byS[t.subj].push(t);});
  const sk=Object.keys(byS);
  const il=[];let si=0,sf=0;
  while(il.length<total&&sf<total*3){sf++;const s=sk[si%sk.length];if(byS[s]&&byS[s].length>0)il.push(byS[s].shift());si++;}
  let pool=[...il];const sched={};
  for(let i=0;i<days.length;i++){
    const date=days[i],q=quota[i];
    if(!pool.length){sched[date]=[];continue;}
    const cs=COACHING[getDOW(date)];
    const la=Math.min(pool.length,q*2);
    const ai=cs.subj?pool.slice(0,la).findIndex(t=>t.subj===cs.subj&&(!cs.sec||t.sec===cs.sec)):-1;
    if(ai>0){const[a]=pool.splice(ai,1);pool.unshift(a);}
    sched[date]=pool.splice(0,q).map(t=>t.id);
  }
  return sched;
}

function spawnConfetti(){
  const colors=["#38BDF8","#34D399","#FBBF24","#F87171","#A78BFA"];
  for(let i=0;i<60;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}

function getLevel(xp){
  const ls=[{min:0,max:99,name:"Beginner",icon:"🌱"},{min:100,max:299,name:"Learner",icon:"📖"},{min:300,max:599,name:"Scholar",icon:"🎯"},{min:600,max:999,name:"Expert",icon:"⚡"},{min:1000,max:1999,name:"Master",icon:"🔥"},{min:2000,max:Infinity,name:"JEE Warrior",icon:"🏆"}];
  return ls.find(l=>xp>=l.min&&xp<=l.max)||ls[0];
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Card({children,style={},glow=false,onClick=null}){return <div onClick={onClick} style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:16,backdropFilter:"blur(12px)",boxShadow:glow?"0 0 24px rgba(56,189,248,0.1),0 4px 24px rgba(0,0,0,0.4)":"0 4px 20px rgba(0,0,0,0.35)",...style,cursor:onClick?"pointer":style.cursor||"default"}}>{children}</div>;}
function Bar({pct,color="#38BDF8",h=6}){return <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:h,overflow:"hidden"}}><div style={{width:`${Math.min(100,pct)}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}cc)`,borderRadius:99,transition:"width 0.5s cubic-bezier(.4,0,.2,1)"}}/></div>;}
function CB({done,color="#38BDF8",size=22}){return <div style={{width:size,height:size,borderRadius:size/3,border:`2px solid ${done?color:"rgba(255,255,255,0.15)"}`,background:done?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",color:"#0A0F1E",fontSize:size*0.55,fontWeight:900}}>{done&&"✓"}</div>;}
function Tag({label,color}){return <span style={{fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",background:`${color}18`,color,borderRadius:6,padding:"3px 8px",lineHeight:1.5}}>{label}</span>;}
function SBadge({status}){const m={active:{c:"#38BDF8",l:"ACTIVE"},completed:{c:"#34D399",l:"COMPLETED"},expired:{c:"#EF4444",l:"EXPIRED"},upcoming:{c:"#FBBF24",l:"UPCOMING"}};const s=m[status]||m.active;return <span style={{fontSize:9,fontWeight:700,letterSpacing:1,background:`${s.c}18`,color:s.c,borderRadius:20,padding:"3px 9px",fontFamily:"'Space Mono',monospace"}}>{s.l}</span>;}

function Picker({label,color,chapters,sel,setSel}){
  const[open,setOpen]=useState(false);
  const ids=chapters.map(c=>c.id);
  const cnt=ids.filter(id=>sel.includes(id)).length;
  const all=ids.every(id=>sel.includes(id));
  return(
    <div style={{marginBottom:8,borderRadius:12,overflow:"hidden",border:`1px solid ${open?color+"40":"rgba(255,255,255,0.07)"}`,transition:"border-color 0.2s"}}>
      <div onClick={()=>setOpen(!open)} style={{padding:"13px 14px",display:"flex",alignItems:"center",cursor:"pointer",userSelect:"none",background:"rgba(255,255,255,0.03)",gap:10}}>
        <div style={{width:3,height:20,borderRadius:3,background:color,flexShrink:0}}/>
        <span style={{fontWeight:700,flex:1,fontSize:13,color:T.text}}>{label}</span>
        {cnt>0&&<span style={{fontSize:10,fontWeight:700,background:`${color}22`,color,borderRadius:20,padding:"2px 9px"}}>{cnt}</span>}
        <span style={{color:T.muted,fontSize:10,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▼</span>
      </div>
      {open&&<div style={{borderTop:"1px solid rgba(255,255,255,0.05)"}}>
        <div onClick={()=>setSel(p=>all?p.filter(id=>!ids.includes(id)):[...new Set([...p,...ids])])} style={{padding:"9px 14px",fontSize:12,color,fontWeight:700,cursor:"pointer",background:`${color}08`,display:"flex",alignItems:"center",gap:8,userSelect:"none"}}>
          <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${all?color:"rgba(255,255,255,0.2)"}`,background:all?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#0A0F1E",fontSize:9,fontWeight:900}}>{all&&"✓"}</div>
          {all?"Deselect All":"Select All"}
        </div>
        <div style={{maxHeight:220,overflowY:"auto"}}>
          {chapters.map(ch=>{
            const s=sel.includes(ch.id);
            return <div key={ch.id} onClick={()=>setSel(p=>s?p.filter(x=>x!==ch.id):[...p,ch.id])} style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:s?`${color}0a`:"transparent",borderBottom:"1px solid rgba(255,255,255,0.04)",userSelect:"none"}}>
              <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${s?color:"rgba(255,255,255,0.15)"}`,background:s?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#0A0F1E",fontSize:9,fontWeight:900}}>{s&&"✓"}</div>
              <span style={{fontSize:13,color:s?T.text:"#94A3B8"}}>{ch.name}</span>
            </div>;
          })}
        </div>
      </div>}
    </div>
  );
}

// ── CERTIFICATE ───────────────────────────────────────────────────────────────
function Certificate({plan,progress,onClose}){
  const all=[...new Set(Object.values(plan.schedule||{}).flat())];
  const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
  const pct=all.length>0?Math.round(done.length/all.length*100):0;
  const byS={};all.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(done.includes(id))byS[s].d++;});
  useEffect(()=>{if(pct===100)spawnConfetti();},[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="pop" style={{background:"linear-gradient(135deg,#0F2044,#1a3a6b)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:24,padding:"32px 24px",maxWidth:400,width:"100%",textAlign:"center",boxShadow:"0 0 60px rgba(56,189,248,0.15)"}}>
        <div style={{fontSize:52,marginBottom:8}}>{pct===100?"🏆":"📋"}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.accent,letterSpacing:2,marginBottom:6}}>{pct===100?"PLAN COMPLETED!":"PLAN SUMMARY"}</div>
        <div style={{fontWeight:900,fontSize:20,color:T.text,marginBottom:4}}>{plan.name}</div>
        <div style={{fontSize:11,color:T.muted,marginBottom:20,fontFamily:"'Space Mono',monospace"}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)}</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:56,fontWeight:700,lineHeight:1,background:`linear-gradient(135deg,${pct===100?"#34D399,#38BDF8":"#FBBF24,#F87171"})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{pct}<span style={{fontSize:24}}>%</span></div>
        <div style={{fontSize:12,color:T.muted,marginBottom:20}}>{done.length} of {all.length} topics completed</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {Object.entries(byS).map(([s,{t,d}])=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:COL[s],width:14}}>{SUBJ_ICON[s]}</span>
              <span style={{fontSize:12,width:84,textTransform:"capitalize",color:"#94A3B8"}}>{s}</span>
              <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={5}/></div>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:30,textAlign:"right"}}>{d}/{t}</span>
            </div>
          ))}
        </div>
        {pct===100&&<div style={{background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:10,padding:"10px",marginBottom:16,fontSize:12,color:"#34D399"}}>+{XP_PLAN} XP earned! 🎉</div>}
        <button onClick={onClose} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#0EA5E9,#38BDF8)",color:"#0A0F1E",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Close</button>
      </div>
    </div>
  );
}

// ── TODAY VIEW ────────────────────────────────────────────────────────────────
function TodayView({plans,progress,onToggle,streak,xp}){
  const cs=COACHING[getDOW(TODAY)];
  const tasks=plans.filter(p=>getPlanStatus(p,progress)==="active").flatMap(plan=>(plan.schedule?.[TODAY]||[]).map(tid=>({planId:plan.id,planName:plan.name,id:tid,ch:ALL_MAP[tid],done:!!(progress[plan.id]?.[TODAY]?.[tid])})));
  const doneCount=tasks.filter(t=>t.done).length;
  const pct=tasks.length>0?Math.round(doneCount/tasks.length*100):0;
  const lv=getLevel(xp);
  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <Card style={{flex:1,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>{lv.icon}</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.accent,letterSpacing:1}}>{lv.name}</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{xp} <span style={{fontSize:9,color:T.muted}}>XP</span></div></div>
        </Card>
        <Card style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10,minWidth:100}}>
          <span style={{fontSize:24}}>🔥</span>
          <div><div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#FBBF24",letterSpacing:1}}>STREAK</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,color:T.text}}>{streak} <span style={{fontSize:9,color:T.muted}}>days</span></div></div>
        </Card>
      </div>
      <Card glow style={{padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:1.5,marginBottom:4}}>TODAY</div>
            <div style={{fontWeight:800,fontSize:14,color:T.text,lineHeight:1.3}}>{fmtLong(TODAY)}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>Coaching: <span style={{color:T.accent,fontWeight:700}}>{cs.label}</span></div>
          </div>
          {tasks.length>0&&<div style={{textAlign:"right"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,lineHeight:1,color:pct===100?"#34D399":T.accent}}>{pct}<span style={{fontSize:14}}>%</span></div><div style={{fontSize:10,color:T.muted}}>{doneCount}/{tasks.length}</div></div>}
        </div>
        {tasks.length>0&&<Bar pct={pct} color={pct===100?"#34D399":T.accent} h={5}/>}
      </Card>
      {!tasks.length?<div style={{textAlign:"center",color:T.muted,paddingTop:60}}><div style={{fontSize:52,opacity:0.2}}>◎</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.6}}>No tasks today.<br/>Create a plan to begin.</div></div>
      :tasks.map((t,i)=>{
        const c=COL[t.ch?.subj]||"#94A3B8";
        return <div key={t.id+t.planId} onClick={()=>onToggle(t.planId,TODAY,t.id)} style={{background:t.done?"rgba(52,211,153,0.06)":"rgba(15,25,50,0.8)",border:`1px solid ${t.done?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:14,padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none",transition:"all 0.2s",animation:`fadeUp 0.3s ${i*0.05}s ease both`}}>
          <CB done={t.done} color={c}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,color:t.done?"#34D399":T.text,textDecoration:t.done?"line-through":"none",opacity:t.done?0.7:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.ch?.name}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:2}}>{t.planName}{t.done&&<span style={{color:"#34D399",marginLeft:6,fontSize:10}}>+{XP_TOPIC}XP</span>}</div>
          </div>
          <div style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0}}/>
        </div>;
      })}
    </div>
  );
}

// ── PLANS VIEW ────────────────────────────────────────────────────────────────
function PlansView({plans,progress,onDelete,onView,onExtend}){
  const[tab,setTab]=useState("active");
  const active=plans.filter(p=>["active","upcoming"].includes(getPlanStatus(p,progress)));
  const arch=plans.filter(p=>["completed","expired"].includes(getPlanStatus(p,progress)));
  const show=tab==="active"?active:arch;
  if(!plans.length)return <div style={{textAlign:"center",color:T.muted,paddingTop:70}} className="fade-up"><div style={{fontSize:52,opacity:0.2,fontFamily:"'Space Mono',monospace"}}>[ ]</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.5}}>No plans yet.<br/>Tap <b style={{color:T.accent}}>New Plan</b> to create one.</div></div>;
  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["active",`Active (${active.length})`],["archive",`Archive (${arch.length})`]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px",borderRadius:10,border:`1.5px solid ${tab===k?T.accent:"rgba(255,255,255,0.08)"}`,background:tab===k?"rgba(56,189,248,0.1)":"rgba(255,255,255,0.03)",color:tab===k?T.accent:T.muted,fontWeight:700,cursor:"pointer",fontSize:11,fontFamily:"'Space Mono',monospace",letterSpacing:0.3,transition:"all 0.15s"}}>{l}</button>
        ))}
      </div>
      {!show.length?<div style={{textAlign:"center",color:T.muted,paddingTop:40,fontSize:13,opacity:0.5}}>{tab==="active"?"No active plans.":"No archived plans yet."}</div>
      :show.map(plan=>{
        const all=[...new Set(Object.values(plan.schedule||{}).flat())];
        const done=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
        const pct=all.length>0?Math.round(done.length/all.length*100):0;
        const st=getPlanStatus(plan,progress);
        const todayT=plan.schedule?.[TODAY]||[];
        return(
          <Card key={plan.id} style={{padding:"18px",marginBottom:12}} glow={st==="active"&&pct>0&&pct<100}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1,minWidth:0,marginRight:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <div style={{fontWeight:800,fontSize:15,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{plan.name}</div>
                  <SBadge status={st}/>
                </div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted}}>{fmtDate(plan.startDate)} → {fmtDate(plan.endDate)} · {plan.dailyHours}h/day</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:26,fontWeight:700,lineHeight:1,color:st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}}>{pct}<span style={{fontSize:12}}>%</span></div>
                <div style={{fontSize:10,color:T.muted}}>{done.length}/{all.length}</div>
              </div>
            </div>
            <Bar pct={pct} color={st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent}/>
            <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>{(plan.subjects||[]).map(s=><Tag key={s} label={s} color={COL[s]}/>)}</div>
            {st==="active"&&todayT.length>0&&<div style={{marginTop:10,fontSize:11,color:T.muted,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:10,lineHeight:1.7}}><span style={{color:T.accent,fontWeight:700}}>Today → </span>{todayT.map(id=>ALL_MAP[id]?.name).filter(Boolean).join(" · ")}</div>}
            {st==="expired"&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,fontSize:11,color:"#EF4444"}}>⚠️ Plan expired — {all.length-done.length} topics incomplete</div>}
            <div style={{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}}>
              <button onClick={()=>onView(plan,false)} style={{fontSize:11,color:T.accent,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>View Schedule →</button>
              {(st==="completed"||st==="expired")&&<button onClick={()=>onView(plan,true)} style={{fontSize:11,color:"#34D399",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📋 Summary</button>}
              {st==="expired"&&<button onClick={()=>onExtend(plan)} style={{fontSize:11,color:"#FBBF24",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>📅 Extend</button>}
              <button onClick={()=>onDelete(plan.id)} style={{fontSize:11,color:"#EF4444",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"'DM Sans',sans-serif"}}>Delete</button>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ── PLAN DETAIL ───────────────────────────────────────────────────────────────
function PlanDetail({plan,progress,onToggle,onBack}){
  const entries=Object.entries(plan.schedule||{});
  const isDone=(pid,date,tid)=>!!(progress[pid]?.[date]?.[tid]);
  return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>‹</button>
        <div style={{fontWeight:800,fontSize:16,color:T.text,flex:1}}>{plan.name}</div>
        <SBadge status={getPlanStatus(plan,progress)}/>
      </div>
      {entries.map(([date,ids])=>{
        const dow=getDOW(date),isPast=date<TODAY,isToday=date===TODAY;
        const allDone=ids.length>0&&ids.every(id=>isDone(plan.id,date,id));
        return(
          <div key={date} style={{background:isToday?"rgba(56,189,248,0.06)":allDone?"rgba(52,211,153,0.04)":"rgba(15,25,50,0.6)",border:`1px solid ${isToday?"rgba(56,189,248,0.2)":allDone?"rgba(52,211,153,0.15)":"rgba(255,255,255,0.05)"}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ids.length?8:0}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:isToday?T.accent:isPast?"#475569":"#94A3B8"}}>{isToday?"▶ ":""}{fmtDate(date)}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {ids.length>0&&<span style={{fontSize:9,background:"rgba(255,255,255,0.06)",color:T.muted,borderRadius:6,padding:"2px 7px",fontFamily:"'Space Mono',monospace",fontWeight:700}}>{ids.length} topics</span>}
                <span style={{fontSize:10,color:T.muted}}>{COACHING[dow].label}</span>
              </div>
            </div>
            {!ids.length?<div style={{fontSize:11,color:"#334155"}}>Buffer / Rest</div>:ids.map(id=>{
              const ch=ALL_MAP[id],d=isDone(plan.id,date,id),c=COL[ch?.subj]||"#94A3B8";
              return <div key={id} onClick={()=>onToggle(plan.id,date,id)} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,cursor:"pointer",userSelect:"none"}}>
                <CB done={d} color={c} size={16}/>
                <span style={{fontSize:13,color:d?"#34D399":"#CBD5E1",textDecoration:d?"line-through":"none",opacity:d?0.6:1}}>{ch?.name}</span>
                <div style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:c,flexShrink:0}}/>
              </div>;
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── CREATE PLAN ───────────────────────────────────────────────────────────────
function CreateView({onSave}){
  const[step,setStep]=useState(1);
  const[name,setName]=useState("");
  const[start,setStart]=useState("");
  const[end,setEnd]=useState("");
  const[hpd,setHpd]=useState(4);
  const[sel,setSel]=useState([]);
  const[sched,setSched]=useState(null);
  const ok=start&&end&&start<=end;
  const inp={width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,fontSize:14,outline:"none",display:"block"};
  const lbl={display:"block",fontSize:10,fontWeight:700,color:T.muted,marginBottom:7,marginTop:16,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'Space Mono',monospace"};

  if(step===1)return(
    <div className="fade-up">
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:2,marginBottom:6}}>NEW PLAN · 1/3</div>

        <label style={lbl}>DAILY HOURS</label>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          {[2,3,4,5,6].map(h=><button key={h} onClick={()=>setHpd(h)} style={{flex:1,padding:"11px 0",borderRadius:10,border:`2px solid ${hpd===h?T.accent:"rgba(255,255,255,0.08)"}`,background:hpd===h?"rgba(56,189,248,0.1)":"rgba(255,255,255,0.03)",color:hpd===h?T.accent:"#64748B",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"'Space Mono',monospace"}}>{h}h</button>)}
        </div>
        <button onClick={()=>setStep(2)} disabled={!ok} style={{...pb,opacity:ok?1:0.4,cursor:ok?"pointer":"default"}}>Next: Select Topics →</button>
      </Card>
    </div>
  );

  if(step===2)return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>{back}<div><div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:2}}>2/3</div><div style={{fontWeight:800,fontSize:16,color:T.text}}>Select Topics</div></div><span style={{marginLeft:"auto",fontSize:10,fontWeight:700,background:"rgba(56,189,248,0.15)",color:T.accent,borderRadius:20,padding:"4px 12px"}}>{sel.length} selected</span></div>
      <Picker label="Mathematics" color={COL.maths} chapters={MATHS} sel={sel} setSel={setSel}/>
      <Picker label="Physics" color={COL.physics} chapters={PHYSICS} sel={sel} setSel={setSel}/>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:COL_IC.physical,letterSpacing:1.5,padding:"10px 4px 6px"}}>CHEMISTRY</div>
      <Picker label="Physical Chemistry" color={COL_IC.physical} chapters={CHEM_PHY} sel={sel} setSel={setSel}/>
      <Picker label="Organic Chemistry" color={COL_IC.organic} chapters={CHEM_ORG} sel={sel} setSel={setSel}/>
      <Picker label="Inorganic Chemistry" color={COL_IC.inorganic} chapters={CHEM_INO} sel={sel} setSel={setSel}/>

    </div>
  );

  if(step===3){
    const entries=Object.entries(sched||{}).filter(([,ids])=>ids.length>0);
    const counts=entries.map(([,ids])=>ids.length);
    const byS={};entries.forEach(([,ids])=>ids.forEach(id=>{const s=ALL_MAP[id]?.subj;if(s)byS[s]=(byS[s]||0)+1;}));

      <div className="fade-up">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>{back}<div><div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,letterSpacing:2}}>3/3</div><div style={{fontWeight:800,fontSize:16,color:T.text}}>Preview</div></div><span style={{marginLeft:"auto",fontSize:10,color:T.muted}}>{entries.length} days</span></div>
        <div style={{background:"rgba(56,189,248,0.06)",border:"1px solid rgba(56,189,248,0.15)",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.accent,letterSpacing:1.5,marginBottom:8}}>DISTRIBUTION</div>
          <div style={{display:"flex",gap:16,marginBottom:8}}>

            <div style={{textAlign:"center"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,color:T.text}}>{counts.length?`${Math.min(...counts)}–${Math.max(...counts)}`:0}</div><div style={{fontSize:9,color:T.muted}}>MIN–MAX</div></div>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,color:T.text}}>{sel.length}</div><div style={{fontSize:9,color:T.muted}}>TOTAL</div></div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(byS).map(([s,n])=><span key={s} style={{fontSize:10,fontWeight:700,background:`${COL[s]}18`,color:COL[s],borderRadius:6,padding:"3px 8px"}}>{s[0].toUpperCase()+s.slice(1)}: {n}</span>)}</div>
        </div>
        <div style={{maxHeight:"38vh",overflowY:"auto",marginBottom:12}}>
          {entries.map(([date,ids])=>(
            <div key={date} style={{background:"rgba(15,25,50,0.7)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:"11px 13px",marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:T.accent}}>{fmtDate(date)}</span><span style={{fontSize:10,color:T.muted}}>{ids.length} topics</span></div>
              {ids.map(id=>{const ch=ALL_MAP[id];return <div key={id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><div style={{width:6,height:6,borderRadius:"50%",background:COL[ch?.subj]||"#555",flexShrink:0}}/><span style={{fontSize:12,color:"#94A3B8"}}>{ch?.name}</span></div>;})}

      </div>
    );
  }
}

// ── PROGRESS VIEW ─────────────────────────────────────────────────────────────
function ProgressView({plans,progress,xp,streak}){
  const lv=getLevel(xp),nvl=getLevel(xp+1);
  const xpToNext=nvl.min>xp?nvl.min-xp:0;
  if(!plans.length)return <div style={{textAlign:"center",color:T.muted,paddingTop:70}} className="fade-up"><div style={{fontSize:52,opacity:0.2,fontFamily:"'Space Mono',monospace"}}>{"{}"}</div><div style={{marginTop:16,fontSize:14,lineHeight:1.8,opacity:0.5}}>No data yet.<br/>Complete tasks to earn XP!</div></div>;
  const allT=plans.flatMap(p=>[...new Set(Object.values(p.schedule||{}).flat())]);
  const allD=plans.flatMap(p=>[...new Set(Object.values(progress[p.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))]);
  const ov=allT.length>0?Math.round(allD.length/allT.length*100):0;
  return(
    <div className="fade-up">
      <Card glow style={{padding:"20px",marginBottom:12,background:"linear-gradient(135deg,rgba(56,189,248,0.12),rgba(52,211,153,0.06))"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <span style={{fontSize:44}}>{lv.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,letterSpacing:1.5}}>LEVEL</div>
            <div style={{fontWeight:900,fontSize:20,color:T.text}}>{lv.name}</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:14,color:T.accent,fontWeight:700}}>{xp} XP</div>
          </div>
          <div style={{textAlign:"center"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:24,fontWeight:700,color:"#FBBF24"}}>🔥{streak}</div><div style={{fontSize:9,color:T.muted,letterSpacing:1}}>DAY STREAK</div></div>
        </div>
        {xpToNext>0&&<><div style={{fontSize:10,color:T.muted,marginBottom:6,fontFamily:"'Space Mono',monospace"}}>{xpToNext} XP to reach {nvl.name} {nvl.icon}</div><Bar pct={Math.round(((xp-lv.min)/Math.max(1,nvl.min-lv.min))*100)} color={T.accent} h={5}/></>}
      </Card>
      <Card style={{padding:"20px",marginBottom:12,textAlign:"center"}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:52,fontWeight:700,lineHeight:1,background:"linear-gradient(135deg,#38BDF8,#34D399)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{ov}<span style={{fontSize:22}}>%</span></div>
        <div style={{color:T.muted,fontSize:11,marginTop:6,fontFamily:"'Space Mono',monospace",letterSpacing:1}}>OVERALL PROGRESS</div>
        <div style={{color:T.muted,fontSize:11,marginTop:4}}>{allD.length} of {allT.length} topics completed</div>
      </Card>
      {plans.map(plan=>{
        const pts=[...new Set(Object.values(plan.schedule||{}).flat())];
        const dt=[...new Set(Object.values(progress[plan.id]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
        const pct=pts.length>0?Math.round(dt.length/pts.length*100):0;
        const st=getPlanStatus(plan,progress);
        const byS={};pts.forEach(id=>{const s=ALL_MAP[id]?.subj;if(!s)return;if(!byS[s])byS[s]={t:0,d:0};byS[s].t++;if(dt.includes(id))byS[s].d++;});
        return(
          <Card key={plan.id} style={{padding:"16px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:4}}>{plan.name}</div><SBadge status={st}/></div>
              <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:20,color:st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent,marginLeft:12,flexShrink:0}}>{pct}%</div>
            </div>
            <Bar pct={pct} color={st==="completed"?"#34D399":st==="expired"?"#EF4444":T.accent} h={5}/>
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
              {Object.entries(byS).map(([s,{t,d}])=>(
                <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:COL[s],width:14,flexShrink:0}}>{SUBJ_ICON[s]}</span>
                  <span style={{fontSize:12,width:84,textTransform:"capitalize",color:"#94A3B8",flexShrink:0}}>{s}</span>
                  <div style={{flex:1}}><Bar pct={t>0?Math.round(d/t*100):0} color={COL[s]} h={4}/></div>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.muted,minWidth:34,textAlign:"right",flexShrink:0}}>{d}/{t}</span>
                </div>
              ))}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

        <div style={{fontSize:12,color:T.muted,marginBottom:20}}>{plan.name} — ends {fmtDate(plan.endDate)}</div>
        <label style={{display:"block",fontSize:10,fontWeight:700,color:T.muted,marginBottom:7,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'Space Mono',monospace"}}>NEW END DATE</label>
        <input type="date" value={newEnd} min={addDays(TODAY,1)} onChange={e=>setNewEnd(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:T.text,fontSize:14,outline:"none",display:"block",marginBottom:16}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",color:T.muted,border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Cancel</button>
          <button onClick={()=>newEnd&&onExtend(plan.id,newEnd)} disabled={!newEnd} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#0EA5E9,#38BDF8)",color:"#0A0F1E",border:"none",borderRadius:10,cursor:newEnd?"pointer":"default",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",opacity:newEnd?1:0.5}}>Extend Plan</button>
        </div>
      </Card>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin,loading}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,background:T.bg}}>
      <div style={{position:"fixed",top:-80,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{textAlign:"center",marginBottom:48}} className="fade-up">
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:T.muted,letterSpacing:3,marginBottom:12}}>JEE 2027</div>
        <div style={{fontWeight:900,fontSize:32,color:T.text,letterSpacing:-1,lineHeight:1.2,marginBottom:12}}>Full Control<br/>Mode</div>
        <div style={{fontSize:13,color:T.muted,lineHeight:1.8}}>Your personal JEE study planner.<br/>Sync across all devices.</div>
      </div>
      <Card style={{width:"100%",maxWidth:360,padding:"28px 24px"}} glow>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:44,marginBottom:8}}>🎯</div>
          <div style={{fontWeight:700,fontSize:16,color:T.text,marginBottom:4}}>Welcome, sir</div>
          <div style={{fontSize:12,color:T.muted}}>Sign in to access your plans</div>
        </div>
        <button onClick={onLogin} disabled={loading} style={{width:"100%",padding:"14px 20px",background:"white",color:"#1E293B",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"'DM Sans',sans-serif",opacity:loading?0.7:1}}>
          {loading?<div style={{width:20,height:20,border:"2.5px solid #CBD5E1",borderTopColor:"#1E293B",borderRadius:"50%"}} className="spin"/>:<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>}
          {loading?"Signing in…":"Continue with Google"}
        </button>
        <div style={{textAlign:"center",fontSize:11,color:T.muted,marginTop:14,lineHeight:1.7}}>Syncs across phone &amp; PC.<br/>Free · No ads · Yours forever.</div>
      </Card>

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[signInLoading,setSignInLoading]=useState(false);
  const[fbReady,setFbReady]=useState(!!window._fbReady);
  const[tab,setTab]=useState("today");
  const[plans,setPlans]=useState([]);
  const[progress,setProgress]=useState({});
  const[xp,setXp]=useState(0);
  const[streak,setStreak]=useState(0);
  const[lastStudy,setLastStudy]=useState(null);
  const[viewing,setViewing]=useState(null);
  const[cert,setCert]=useState(null);
  const[extPlan,setExtPlan]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    if(window._fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("fbReady",h);
    return()=>window.removeEventListener("fbReady",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const unsub=window._fb.onAuth(async u=>{
      setUser(u);setAuthLoading(false);
      if(u){
        setSyncing(true);
        const data=await window._fb.load(u.uid);
        if(data){
          if(data.plans)setPlans(data.plans);
          if(data.progress)setProgress(data.progress);
          if(data.xp!=null)setXp(data.xp);
          if(data.streak!=null)setStreak(data.streak);
          if(data.lastStudy)setLastStudy(data.lastStudy);
        } else {
          const lp=LS.get("jee_plans_v4"),lpr=LS.get("jee_progress_v4");
          if(lp)setPlans(lp);if(lpr)setProgress(lpr);
        }
        setSyncing(false);
        if(unsubRef.current)unsubRef.current();
        unsubRef.current=window._fb.listen(u.uid,d=>{
          if(d.plans)setPlans(d.plans);if(d.progress)setProgress(d.progress);
          if(d.xp!=null)setXp(d.xp);if(d.streak!=null)setStreak(d.streak);
        });
      } else {if(unsubRef.current){unsubRef.current();unsubRef.current=null;}}
    });
    return()=>unsub();
  },[fbReady]);

  const syncToCloud=useCallback(async(np,npr,nxp,ns,nls)=>{
    LS.set("jee_plans_v4",np||plans);LS.set("jee_progress_v4",npr||progress);
    if(user){
      try{await window._fb.save(user.uid,{plans:np||plans,progress:npr||progress,xp:nxp!=null?nxp:xp,streak:ns!=null?ns:streak,lastStudy:nls||lastStudy,updatedAt:new Date().toISOString()});}
      catch(e){console.error("Sync error",e);}
    }
  },[user,plans,progress,xp,streak,lastStudy]);

  const savePlans=async np=>{setPlans(np);await syncToCloud(np,null,null,null,null);};

  const onToggle=async(planId,date,topicId)=>{
    const npr={...progress};
    if(!npr[planId])npr[planId]={};
    if(!npr[planId][date])npr[planId][date]={};
    const was=npr[planId][date][topicId];
    npr[planId][date][topicId]=!was;
    let nxp=Math.max(0,xp+(was?-XP_TOPIC:XP_TOPIC));
    let ns=streak,nls=lastStudy;
    if(!was){
      if(lastStudy===addDays(TODAY,-1)){ns=streak+1;nls=TODAY;}
      else if(lastStudy!==TODAY){ns=1;nls=TODAY;}
    }
    const plan=plans.find(p=>p.id===planId);
    if(plan&&!was){
      const all=[...new Set(Object.values(plan.schedule||{}).flat())];
      const done=[...new Set(Object.values(npr[planId]||{}).flatMap(d=>Object.entries(d).filter(([,v])=>v).map(([k])=>k)))];
      if(done.length===all.length){nxp+=XP_PLAN;setTimeout(()=>setCert(plan),400);}
    }
    setProgress(npr);setXp(nxp);setStreak(ns);setLastStudy(nls);
    await syncToCloud(null,npr,nxp,ns,nls);
  };

  const onDelete=async id=>{
    const np=plans.filter(p=>p.id!==id);
    const npr={...progress};delete npr[id];
    setPlans(np);setProgress(npr);
    await syncToCloud(np,npr,null,null,null);
    if(viewing?.id===id)setViewing(null);
  };

  const onExtend=async(planId,newEnd)=>{
    const np=plans.map(p=>{
      if(p.id!==planId)return p;
      return{...p,endDate:newEnd,schedule:buildSchedule(p.selectedTopics||[],p.startDate,newEnd)};
    });
    setExtPlan(null);await savePlans(np);
  };

  if(!fbReady||authLoading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,flexDirection:"column",gap:14,color:T.muted}}>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:24,color:T.accent}} className="pulse">JEE 2027</div>
      <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",opacity:0.5}}>Loading…</div>
    </div>
  );

  if(!user)return <LoginScreen onLogin={async()=>{setSignInLoading(true);try{await window._fb.signIn();}catch(e){console.error(e);}setSignInLoading(false);}} loading={signInLoading}/>;

  const TABS=[{k:"today",icon:"◉",lbl:"Today"},{k:"plans",icon:"◧",lbl:"Plans"},{k:"create",icon:"⊕",lbl:"New"},{k:"progress",icon:"◈",lbl:"Progress"}];

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:T.bg,paddingBottom:80,position:"relative"}}>
      <div style={{position:"fixed",top:-80,left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(10,15,30,0.92)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(56,189,248,0.08)",padding:"12px 16px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,letterSpacing:2.5,textTransform:"uppercase",marginBottom:2}}>JEE 2027 · Full Control Mode</div>
            <div style={{fontWeight:900,fontSize:18,color:T.text,letterSpacing:-0.5}}>{viewing?viewing.name:({today:"Today's Tasks",plans:"My Plans",create:"New Plan",progress:"Progress"}[tab])}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {syncing&&<div style={{width:16,height:16,border:"2px solid rgba(56,189,248,0.3)",borderTopColor:T.accent,borderRadius:"50%"}} className="spin"/>}
            <img src={user.photoURL||""} onError={e=>{e.target.style.display="none";}} style={{width:30,height:30,borderRadius:"50%",border:"2px solid rgba(56,189,248,0.3)",cursor:"pointer"}} onClick={()=>{if(confirm("Sign out?"))window._fb.signOut();}} title="Sign out"/>
          </div>
        </div>
      </div>

      <div style={{padding:"14px 12px 8px",position:"relative",zIndex:1}}>
        {viewing?(
          <PlanDetail plan={viewing} progress={progress} onToggle={onToggle} onBack={()=>setViewing(null)}/>
        ):(
          <>
            {tab==="today"&&<TodayView plans={plans} progress={progress} onToggle={onToggle} streak={streak} xp={xp}/>}
            {tab==="plans"&&<PlansView plans={plans} progress={progress} onDelete={onDelete} onView={(p,c)=>{c?setCert(p):setViewing(p);}} onExtend={setExtPlan}/>}
            {tab==="create"&&<CreateView onSave={async plan=>{await savePlans([...plans,plan]);setTab("plans");}}/>}
            {tab==="progress"&&<ProgressView plans={plans} progress={progress} xp={xp} streak={streak}/>}
          </>
        )}
      </div>

      {!viewing&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(10,15,30,0.96)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(56,189,248,0.08)",display:"flex",justifyContent:"space-around",padding:"8px 0 14px",zIndex:30}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 12px",color:tab===t.k?T.accent:T.muted,fontWeight:tab===t.k?700:400,fontSize:9,letterSpacing:0.8,textTransform:"uppercase",fontFamily:"'Space Mono',monospace",userSelect:"none",transition:"color 0.15s"}}>
              <span style={{fontSize:18,lineHeight:1.1,fontFamily:"monospace"}}>{t.icon}</span>{t.lbl}
            </button>
          ))}
        </div>
      )}

      {cert&&<Certificate plan={cert} progress={progress} onClose={()=>setCert(null)}/>}
      {extPlan&&<ExtendModal plan={extPlan} onExtend={onExtend} onClose={()=>setExtPlan(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
